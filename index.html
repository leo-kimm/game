<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#00d2ff">
    <link rel="apple-touch-icon" href="./icon-192.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo's Game Arcade</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
            background: linear-gradient(to right, #00d2ff, #928DAB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .game-grid {
            display: grid;
            /* 3개가 예쁘게 들어가도록 minmax 유지 */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            /* 3개의 카드가 한 줄에 들어갈 수 있도록 최대 너비 확장 */
            max-width: 1000px; 
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* 🎮 게임별 테마 호버 효과 */
        .card.neon:hover {
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            border-color: #0ff;
        }
        .card.luge:hover {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            border-color: #ffd700;
        }
        /* [신규 추가] 디펜스 게임 전용 테마 */
        .card.defense:hover {
            box-shadow: 0 0 30px rgba(122, 166, 255, 0.4);
            border-color: #7aa6ff;
        }
        /* [신규 추가] Kimchi Pop 전용 테마 */
        .card.kimchipop:hover {
            box-shadow: 0 0 30px rgba(229, 57, 53, 0.4);
            border-color: #E53935;
        }



        .icon { 
            font-size: 4rem; 
            margin-bottom: 20px; 
            display: block; 
            transition: transform 0.3s;
        }
        .card:hover .icon { transform: scale(1.2); }

        .title { 
            font-size: 1.5rem; 
            font-weight: 900; 
            display: block; 
            margin-bottom: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .desc { 
            font-size: 0.9rem; 
            color: #aaa; 
            display: block; 
            line-height: 1.6;
        }

        /* 뱃지 디자인 */
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.7rem;
            padding: 5px 10px;
            border-radius: 12px;
            font-weight: 900;
            letter-spacing: 1px;
        }
        .badge.new { background: #ff4757; color: white; }
        .badge.season2 { background: #ff00de; color: white; box-shadow: 0 0 10px #ff00de; }
        /* [신규 추가] 디펜스 게임 뱃지 */
        .badge.beta { background: rgba(42,53,102,0.9); color: #7aa6ff; border: 1px solid #7aa6ff; box-shadow: 0 0 10px rgba(122,166,255,0.4); }

        footer {
            margin-top: 50px;
            color: #666;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <h1>Leo's Arcade</h1>

    <div class="game-grid">
        <a href="./neon-dodge/" class="card neon">
            <span class="badge season2">SEASON 2</span>
            <span class="icon">👾</span>
            <span class="title" style="color: #0ff;">Neon Dodge 2</span>
            <span class="desc">초고속 총알 피하기 액션.<br>극한의 반응속도에 도전하라!</span>
        </a>

        <a href="./luge/" class="card luge">
            <span class="badge new">HOT</span>
            <span class="icon">🛷</span>
            <span class="title" style="color: #ffd700;">Luge Olympic</span>
            <span class="desc">물리 기반 드로잉 퍼즐.<br>나만의 트랙을 그려 금메달을 노려라!</span>
        </a>

        <a href="./defense/" class="card defense">
            <span class="badge beta">BETA</span>
            <span class="icon">🛡️</span>
            <span class="title" style="color: #7aa6ff;">Tactical Defense</span>
            <span class="desc">사령관님, 방어선을 구축하세요.<br>전술적 타워 배치와 한계 돌파!</span>
        </a>

        <a href="./kimchi-pop/" class="card kimchipop">
            <span class="badge new">HOT</span>
            <span class="icon">🥬</span>
            <span class="title" style="color: #E53935;">Kimchi Pop</span>
            <span class="desc">신선한 김장 액션 퍼즐.<br>터뜨려라, 연쇄 김장 콤보!</span>
        </a>


    </div>

    <footer>
        © 2026 Leo Kim. All rights reserved.
    </footer>

    <div id="update-toast" style="
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 210, 255, 0.95); color: #000;
        padding: 15px 25px; border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: none; align-items: center; gap: 15px; z-index: 9999;
        font-weight: bold; font-family: sans-serif;
        border: 2px solid #fff;
    ">
        <span>🚀 새 버전이 업데이트되었습니다!</span>
        <button id="reload-btn" style="
            background: #000; color: #fff; border: none;
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;
        ">재실행</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then((reg) => {
                    console.log('Service Worker Registered');

                    if (reg.waiting) {
                        showUpdateToast(reg.waiting);
                        return;
                    }

                    reg.onupdatefound = () => {
                        const newWorker = reg.installing;
                        newWorker.onstatechange = () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateToast(newWorker);
                            }
                        };
                    };
                });
            });
        }

        function showUpdateToast(worker) {
            const toast = document.getElementById('update-toast');
            const btn = document.getElementById('reload-btn');
            
            toast.style.display = 'flex';
            
            btn.onclick = () => {
                worker.postMessage({ action: 'skipWaiting' });
                window.location.reload();
            };
        }
    </script>     
</body>
</html>

<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kimchi Pop</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #111;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      /* 모바일 브라우저 스크롤 방지 */
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #222;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #toast {
      position: absolute;
      top: 20px;
      right: 20px;
      left: auto;
      transform: translateX(120%);
      background: rgba(40, 20, 10, 0.85);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      border-left: 4px solid #D4AF37;
      border-radius: 4px;
      color: #FFF9C4;
      padding: 12px 18px;
      box-shadow: -2px 4px 12px rgba(0, 0, 0, 0.4);
      z-index: 1000;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
      pointer-events: none;
      text-align: left;
      min-width: 200px;
      max-width: 280px;
    }

    #toast.toast-pop {
      transform: translateX(0);
    }

    .toast-title {
      font-family: 'serif';
      font-size: 14px;
      font-weight: bold;
      color: #D4AF37;
      margin-bottom: 5px;
    }

    .toast-body {
      font-family: 'sans-serif';
      font-size: 15px;
      line-height: 1.4;
      color: #fff;
      white-space: pre-wrap;
      word-break: keep-all;
    }
  </style>
</head>

<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="toast"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBZBBkH7oSHwxUACfc48RVoMYOtunzgWAw",
      authDomain: "kimchi-pop.firebaseapp.com",
      projectId: "kimchi-pop",
      storageBucket: "kimchi-pop.firebasestorage.app",
      messagingSenderId: "630318023371",
      appId: "1:630318023371:web:1427b38c7305cc22f9514e",
      measurementId: "G-VS1VPSR523"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    window.saveFirebaseScore = async (name, score, stats) => {
      try {
        const q = query(collection(db, "rankings"), where("name", "==", name));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
          // Nickname exists
          let existingDoc = querySnapshot.docs[0];
          if (score > existingDoc.data().score) {
            await updateDoc(doc(db, "rankings", existingDoc.id), { score: score, date: Date.now(), kimchiStats: stats || {} });
            return { success: true, message: "🏆 최고 기록 경신! 랭킹이 업데이트되었습니다." };
          } else {
            return { success: false, message: "😅 아쉽네요! 기존 최고 기록에 미치지 못했습니다." };
          }
        } else {
          // New nickname
          await addDoc(collection(db, "rankings"), { name: name, score: score, date: Date.now(), kimchiStats: stats || {} });
          return { success: true, message: "🏆 새로운 장인 등극! 랭킹 등록 완료!" };
        }
      } catch (e) {
        console.error("Error saving score:", e);
        return { success: false, message: "통신 오류가 발생했습니다." };
      }
    };

    window.getFirebaseRankings = async () => {
      try {
        const q = query(collection(db, "rankings"), orderBy("score", "desc"), limit(10));
        const snap = await getDocs(q);
        let data = [];
        snap.forEach(doc => data.push(doc.data()));
        return data;
      } catch (e) { console.error(e); return []; }
    };
  </script>
  <script>
    /**
     * [게임 설정 및 상수]
     */
    const CONFIG = {
      GRAVITY: 0.6,
      FRICTION: 0.95,
      RESTITUTION: 0.1, // 반발 계수 (낮을수록 덜 튐)
      BALL_RADIUS: 30,
      MAX_BALLS: 300,
      TARGET_INTERVAL: 5000,
      COLORS: [
        { name: '배추김치', hex: '#E53935', type: 'BAECHU' },
        { name: '동치미', hex: '#F5F5F5', type: 'DONGCHIMI' },
        { name: '열무김치', hex: '#43A047', type: 'YEOLMU' },
        { name: '총각김치', hex: '#FFD54F', type: 'CHONGGAK' },
        { name: '깍두기', hex: '#E64A19', type: 'KKAKDUGI' }
      ]
    };

    let FALL_SPEED = 8;

    const STATE = { MENU: 0, PLAYING: 1, ENDING: 2, READY: 3, TUTORIAL: 4, RANKING: 5 };

    let isScoreSaved = false;
    let rankingsData = null;
    let rankingScrollOffset = 0;
    let isRankingScrolling = false;
    let rankingStartY = 0;

    let currentTutorialPage = 0;
    let hasSeenTutorial = localStorage.getItem('kimchiPopTutorialSeen') === 'true';
    const tutorialData = [
      { title: "수라간 입문 - 제 1 장", body: "화면 위에서 떨어지는 재료를\n가볍게 터치하면 팝! 터집니다.\n\n구슬을 터뜨려 점수를 모으세요." },
      { title: "수라간 입문 - 제 2 장", body: "같은 색상의 재료를 이어서\n스와이프 해보세요!\n\n5~6개를 이으면 숙성을 돕는 귀한\n'마늘'과 '새우젓'이 생성됩니다." },
      { title: "수라간 입문 - 제 3 장", body: "같은 재료를 7개 이상 이으면\n마침내 '수라상 김치'가 완성됩니다.\n\n길게 이을수록 거대하고 강력한\n대왕 김치가 탄생합니다!" },
      { title: "수라간 입문 - 제 4 장", body: "완성된 김치가 빛날 때 터치하면\n김치별로 고유한 필살기가 발동합니다.\n\n다양한 김치를 담가\n수라간 최고의 장인이 되어보세요!" }
    ];

    const JAR_MARGIN = 20;
    const FLOOR_MARGIN = 30;

    /**
     * [전역 상태]
     */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const toastEl = document.getElementById('toast');

    let gameState = STATE.MENU;
    let gameOverTimer = 0; // New timer for safety buffer
    let readyTimer = 0;
    let endingTimer = 0;
    let freezeTimeout = null;

    let currentStageTime = 0;
    let bestSurvivalTime = parseFloat(localStorage.getItem('kimchiPopBestSurvivalTime')) || 0;

    let balls = [];
    let particles = [];
    let floatingTexts = [];
    let selectedBalls = [];
    let isSwiping = false;
    let inventory = [];
    let currentSwipeColor = null;

    let totalScore = 0;
    let currentScore = 0;
    let agingMultiplier = 1.0;

    let kimchiStats = { BAECHU: 0, DONGCHIMI: 0, YEOLMU: 0, CHONGGAK: 0, KKAKDUGI: 0 };
    let currentPhase = 1;
    let phaseTimer = 0;
    let currentColors = [];
    let baseFallSpeed = 3;
    let baseSpawnInterval = 1000;
    let currentSpawnInterval = 1000;

    let lastTime = 0;
    let spawnTimer = 0;

    // 캔버스 사이즈 동적 초기화
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    /**
     * [클래스: 물리 구슬]
     */
    class Ball {
      constructor(x, y, radius, colorObj) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.r = radius;
        this.colorObj = colorObj;
        this.type = 'RAW';
        this.spawnTime = Date.now();
      }
    }

    class Particle {
      constructor(x, y, colorHex) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 15;
        this.vy = (Math.random() - 0.5) * 15;
        this.life = 1.0;
        this.colorHex = colorHex;
        this.size = Math.random() * 8 + 4;
      }
    }

    class FloatingText {
      constructor(x, y, text, color, size) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.size = size;
        this.life = 1.0;
        this.vy = -1.5;
      }
    }

    /**
     * [공통 헬퍼]
     */
    function showToast(msg) {
      toastEl.innerHTML = `
        <div class="toast-title">📜 수라간 알림</div>
        <div class="toast-body">${msg}</div>
      `;
      toastEl.classList.remove('toast-pop');
      void toastEl.offsetWidth; // trigger reflow
      toastEl.classList.add('toast-pop');
      toastEl.style.opacity = 1;

      // Calculate dynamic display time based on message length
      let displayTime = Math.max(1500, msg.length * 60);

      setTimeout(() => {
        toastEl.style.opacity = 0;
        setTimeout(() => toastEl.classList.remove('toast-pop'), 300);
      }, displayTime);
    }

    function checkAndSaveBestSurvival() {
      if (currentStageTime > bestSurvivalTime) {
        bestSurvivalTime = currentStageTime;
        localStorage.setItem('kimchiPopBestSurvivalTime', bestSurvivalTime);
        showToast('New Survival Record!');
      }
    }

    function checkWipedColors(removedTypes) {
      let changed = false;
      removedTypes.forEach(type => {
        let idx = currentColors.findIndex(c => c.type === type);
        if (idx !== -1) {
          let stillExists = balls.some(b => b.colorObj && b.colorObj.type === type);
          if (!stillExists) {
            let available = CONFIG.COLORS.filter(c => !currentColors.some(cc => cc.type === c.type));
            if (available.length > 0) {
              currentColors[idx] = available[Math.floor(Math.random() * available.length)];
              changed = true;
            }
          }
        }
      });
      if (changed) showToast('🎉 새로운 측실 재료 등장! 🎉');
    }

    function startGame() {
      isScoreSaved = false;
      kimchiStats = { BAECHU: 0, DONGCHIMI: 0, YEOLMU: 0, CHONGGAK: 0, KKAKDUGI: 0 };
      balls = [];
      particles = [];
      floatingTexts = [];
      inventory = [];
      totalScore = 0;
      currentStageTime = 0;

      currentPhase = 1;
      phaseTimer = 0;
      baseFallSpeed = 3;
      baseSpawnInterval = 1000;
      currentSpawnInterval = baseSpawnInterval;
      FALL_SPEED = baseFallSpeed;

      let shuffled = [...CONFIG.COLORS].sort(() => 0.5 - Math.random());
      currentColors = shuffled.slice(0, 2); // Start easy with 2 colors

      for (let i = 0; i < 20; i++) {
        let rx = JAR_MARGIN + 50 + Math.random() * (canvas.width - JAR_MARGIN * 2 - 100);
        let ry = canvas.height - 100 - Math.random() * 150;
        let randomColor = currentColors[Math.floor(Math.random() * currentColors.length)];
        let newBall = new Ball(rx, ry, CONFIG.BALL_RADIUS, randomColor);
        newBall.vx = 0;
        newBall.vy = 0;
        balls.push(newBall);
      }

      gameState = STATE.PLAYING;
      spawnTimer = 0;
    }

    function checkGameOver() {
      let jarTop = canvas.height * 0.35;
      let isOverflowing = false;

      for (let i = 0; i < balls.length; i++) {
        let b = balls[i];
        // 방금 생성된 구슬(y < 50) 제외
        // 입구 위쪽(y < jarTop)에서 거의 멈춰있는(vx, vy < 0.5) 구슬이 있는지 체크
        if (b.y > 50 && b.y < jarTop && Math.abs(b.vy) < 0.5 && Math.abs(b.vx) < 0.5) {
          isOverflowing = true;
          break;
        }
      }

      // 구슬 개수가 물리적 한계를 넘었을 때도 즉시 체크
      if (balls.length > CONFIG.MAX_BALLS) return true;

      return isOverflowing;
    }

    /**
     * [물리 업데이트]
     */
    function updatePhysics(dt) {
      let jarTop = canvas.height * 0.35;

      // 1. 중력 및 위치 업데이트
      for (let i = balls.length - 1; i >= 0; i--) {
        let b = balls[i];
        let isFrozen = freezeTimeout !== null;
        let grav = isFrozen ? 0.1 : CONFIG.GRAVITY;
        let limitVy = isFrozen ? 2 : Math.max(8, FALL_SPEED + 4);

        b.vy += grav;
        b.vx *= CONFIG.FRICTION;
        b.vy *= CONFIG.FRICTION;
        if (b.vy > limitVy) b.vy = limitVy;

        b.x += b.vx;
        b.y += b.vy;

        // 벽 충돌 (좌/우) - 공중 포함 전체 적용!
        if (b.x - b.r < JAR_MARGIN) { b.x = b.r + JAR_MARGIN; b.vx *= -CONFIG.RESTITUTION; }
        if (b.x + b.r > canvas.width - JAR_MARGIN) { b.x = canvas.width - JAR_MARGIN - b.r; b.vx *= -CONFIG.RESTITUTION; }

        // 바닥 충돌
        if (b.x > JAR_MARGIN && b.x < canvas.width - JAR_MARGIN) {
          if (b.y + b.r > canvas.height - FLOOR_MARGIN) { b.y = canvas.height - FLOOR_MARGIN - b.r; b.vy *= -CONFIG.RESTITUTION; }
        }

        if (b.y > canvas.height + 100) {
          balls.splice(i, 1);
        }

        // 2. 구슬 간 충돌 해결 (거리 기반 겹침 밀어내기)
        // 안정성을 위해 2회 반복 연산(Iteration)
        for (let iter = 0; iter < 2; iter++) {
          for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
              let b1 = balls[i];
              let b2 = balls[j];
              let dx = b2.x - b1.x;
              let dy = b2.y - b1.y;
              let dist = Math.sqrt(dx * dx + dy * dy);
              let minDist = b1.r + b2.r;

              if (dist < minDist) {
                let overlap = minDist - dist;
                let nx = dx / dist;
                let ny = dy / dist;

                // 서로 반반씩 밀어냄
                b1.x -= nx * overlap * 0.5;
                b1.y -= ny * overlap * 0.5;
                b2.x += nx * overlap * 0.5;
                b2.y += ny * overlap * 0.5;

                // 속도 감쇠
                b1.vx *= 0.8; b1.vy *= 0.8;
                b2.vx *= 0.8; b2.vy *= 0.8;
              }
            }
          }
        }
      }
    }

    /**
     * [김치 문양 그리기]
     */
    /**
     * [김치 오브제 통합 렌더링 함수]
     * 모든 수치는 반지름 r에 비례(r * n)하여 UI와 실제 구슬의 디자인을 일치시킴
     */
    function drawKimchi(ctx, x, y, r, typeObj) {
      let type = typeObj.type;
      let hex = typeObj.hex;

      ctx.save();
      ctx.translate(x, y);

      // 김치 기본 원형
      ctx.beginPath();
      if (type === 'BAECHU') {
        const points = 20;
        for (let i = 0; i <= points; i++) {
          let angle = (i / points) * Math.PI * 2;
          let wave = (i % 2 === 0) ? 0.92 : 1.05;
          let rx = Math.cos(angle) * r * 0.85 * wave;
          let ry = Math.sin(angle) * r * 0.85 * wave;
          if (i === 0) ctx.moveTo(rx, ry);
          else ctx.lineTo(rx, ry);
        }
        ctx.closePath();
      } else {
        ctx.arc(0, 0, r, 0, Math.PI * 2);
      }
      ctx.fillStyle = hex;
      ctx.fill();

      // 내부 디테일 (클리핑을 사용하여 원 밖으로 나가지 않게 함)
      ctx.save();
      ctx.beginPath();
      if (type === 'BAECHU') {
        const points = 20;
        for (let i = 0; i <= points; i++) {
          let angle = (i / points) * Math.PI * 2;
          let wave = (i % 2 === 0) ? 0.92 : 1.05;
          let rx = Math.cos(angle) * r * 0.85 * wave;
          let ry = Math.sin(angle) * r * 0.85 * wave;
          if (i === 0) ctx.moveTo(rx, ry);
          else ctx.lineTo(rx, ry);
        }
        ctx.closePath();
      } else {
        ctx.arc(0, 0, r, 0, Math.PI * 2);
      }
      ctx.clip();

      if (type === 'BAECHU') {
        // 중앙 잎맥 (연한 핑크/오렌지)
        ctx.strokeStyle = '#ffccbc';
        ctx.lineWidth = r * 0.15;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, r * 0.8);
        ctx.lineTo(0, -r * 0.8); // 중심 줄기
        ctx.stroke();

        // 잔가지 잎맥
        ctx.lineWidth = r * 0.06;
        for (let j = -2; j <= 2; j++) {
          let h = j * r * 0.3;
          ctx.beginPath();
          ctx.moveTo(0, h);
          ctx.lineTo(-r * 0.4, h - r * 0.2);
          ctx.moveTo(0, h);
          ctx.lineTo(r * 0.4, h - r * 0.2);
          ctx.stroke();
        }

        // 고명 (초록 쪽파 & 검붉은 고춧가루)
        for (let k = 0; k < 12; k++) {
          ctx.fillStyle = (k % 2 === 0) ? '#4CAF50' : '#8B0000';
          let gx = (Math.random() - 0.5) * r * 1.3;
          let gy = (Math.random() - 0.5) * r * 1.3;
          ctx.beginPath();
          ctx.arc(gx, gy, r * 0.05, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      else if (type === 'DONGCHIMI') {
        // 맑은 국물 그라데이션
        let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
        grad.addColorStop(0, '#FFFFFF');
        grad.addColorStop(1, '#E0F7FA');
        ctx.fillStyle = grad;
        ctx.fill();
        // 무 단면
        ctx.fillStyle = '#F9FBE7';
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2);
        ctx.fill();
        // 실고추 & 쪽파 고명
        ctx.fillStyle = '#D32F2F'; // 실고추
        ctx.fillRect(-r * 0.4, -r * 0.1, r * 0.5, r * 0.05);
        ctx.fillStyle = '#388E3C'; // 쪽파
        ctx.fillRect(r * 0.1, r * 0.2, r * 0.2, r * 0.2);
      }
      else if (type === 'YEOLMU') {
        // 열무 줄기 결
        ctx.strokeStyle = '#1B5E20';
        ctx.lineWidth = r * 0.12;
        ctx.beginPath();
        for (let i = -1; i <= 1; i++) {
          ctx.moveTo(i * (r * 0.3), r);
          ctx.lineTo(i * (r * 0.2), -r);
        }
        ctx.stroke();
        // 잎사귀 표현
        ctx.fillStyle = '#81C784';
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.ellipse(-r * 0.4, -r * 0.2, r * 0.3, r * 0.6, Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(r * 0.4, r * 0.1, r * 0.2, r * 0.5, -Math.PI / 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
      else if (type === 'CHONGGAK') {
        // 무 하단 그라데이션 (하얀 무 부분)
        let grad = ctx.createLinearGradient(0, r, 0, -r);
        grad.addColorStop(0, '#FFFFFF');
        grad.addColorStop(0.5, hex);
        ctx.fillStyle = grad;
        ctx.fill();
        // 무청 (초록색 꼬리) - 위쪽으로 솟음
        ctx.fillStyle = '#2E7D32';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-r * 0.5, -r * 0.8, -r * 0.2, -r * 1.4, 0, -r * 1.2);
        ctx.bezierCurveTo(r * 0.2, -r * 1.4, r * 0.5, -r * 0.8, 0, 0);
        ctx.fill();
      }
      else if (type === 'KKAKDUGI') {
        // 깍두기 정육면체 느낌 (밝은 면과 어두운 면)
        ctx.fillStyle = '#FFFDE7'; // Creamy white radish interior
        let sz = r * 0.6;
        ctx.fillRect(-sz, -sz, sz * 2, sz * 2);
        // 입체 선 (그림자 및 하이라이트)
        ctx.strokeStyle = hex; // Spicy red edge
        ctx.lineWidth = r * 0.1;
        ctx.strokeRect(-sz, -sz, sz * 2, sz * 2);
        ctx.beginPath();
        ctx.moveTo(-sz, -sz); ctx.lineTo(sz, sz); // 대각선으로 입체감 부여
        ctx.stroke();
      }

      ctx.restore(); // 클리핑 해제

      // 공통: 신선한 광택 (Juicy Gloss)
      let gloss = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, -r * 0.3, -r * 0.3, r * 0.8);
      gloss.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
      gloss.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = gloss;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();

      // 테두리 마무리
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.restore();
    }

    /**
     * [태극기 문양 그리기]
     */
    function drawTaegeuk(ctx, x, y, radius) {
      // 위쪽 붉은색 (Red)
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI, true);
      ctx.arc(x - radius / 2, y, radius / 2, Math.PI, 0, true);
      ctx.arc(x + radius / 2, y, radius / 2, Math.PI, 0, false);
      ctx.fillStyle = 'rgba(229, 57, 53, 0.2)';
      ctx.fill();

      // 아래쪽 푸른색 (Blue)
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI, false);
      ctx.arc(x - radius / 2, y, radius / 2, Math.PI, 0, true);
      ctx.arc(x + radius / 2, y, radius / 2, Math.PI, 0, false);
      ctx.fillStyle = 'rgba(67, 160, 71, 0.2)';
      ctx.fill();
    }

    /**
     * [아이템 그리기: 마늘 (GARLIC)]
     */
    function drawGarlic(ctx, x, y, r) {
      ctx.save();
      ctx.translate(x, y);

      // Root
      ctx.fillStyle = '#8D6E63';
      ctx.beginPath();
      ctx.arc(0, r * 0.8, r * 0.15, 0, Math.PI * 2);
      ctx.fill();

      // Cloves (3 main cloves overlapping left/right/front)
      ctx.strokeStyle = '#E6CEAC';
      ctx.lineWidth = 1;

      // Left clove
      ctx.fillStyle = '#FFF9C4';
      ctx.beginPath();
      ctx.moveTo(0, -r * 0.5);
      ctx.bezierCurveTo(-r * 0.9, -r * 0.2, -r * 0.9, r * 0.8, -r * 0.2, r * 0.8);
      ctx.bezierCurveTo(-r * 0.1, r * 0.8, 0, r * 0.6, 0, 0);
      ctx.fill();
      ctx.stroke();

      // Right clove
      ctx.beginPath();
      ctx.moveTo(0, -r * 0.5);
      ctx.bezierCurveTo(r * 0.9, -r * 0.2, r * 0.9, r * 0.8, r * 0.2, r * 0.8);
      ctx.bezierCurveTo(r * 0.1, r * 0.8, 0, r * 0.6, 0, 0);
      ctx.fill();
      ctx.stroke();

      // Center front clove
      ctx.beginPath();
      ctx.moveTo(0, -r * 0.6);
      ctx.bezierCurveTo(-r * 0.4, -r * 0.1, -r * 0.4, r * 0.9, 0, r * 0.9);
      ctx.bezierCurveTo(r * 0.4, r * 0.9, r * 0.4, -r * 0.1, 0, -r * 0.6);
      ctx.fill();
      ctx.stroke();

      // Sprout tip
      ctx.fillStyle = '#81C784';
      ctx.beginPath();
      ctx.moveTo(0, -r * 0.6);
      ctx.quadraticCurveTo(r * 0.2, -r * 0.9, r * 0.1, -r * 1.1);
      ctx.quadraticCurveTo(-r * 0.1, -r * 0.9, 0, -r * 0.6);
      ctx.fill();

      ctx.restore();
    }

    /**
     * [아이템 그리기: 새우젓 (SHRIMP)]
     */
    function drawShrimp(ctx, x, y, r) {
      ctx.save();
      ctx.translate(x, y);

      // Rotate slightly inward
      ctx.rotate(-Math.PI / 6);

      ctx.strokeStyle = '#D84315';
      ctx.lineWidth = Math.max(1, r * 0.05);

      // Whiskers
      ctx.beginPath();
      ctx.moveTo(r * 0.4, -r * 0.3);
      ctx.quadraticCurveTo(r * 0.8, -r * 0.6, r * 0.9, r * 0.2);
      ctx.moveTo(r * 0.4, -r * 0.3);
      ctx.quadraticCurveTo(r * 1.0, -r * 0.4, r * 0.8, r * 0.4);
      ctx.stroke();

      // Body (curved crescent)
      ctx.fillStyle = '#FFAB91';
      ctx.beginPath();
      ctx.moveTo(r * 0.4, -r * 0.3); // Head
      ctx.bezierCurveTo(-r * 0.8, -r * 0.8, -r * 0.9, r * 0.5, -r * 0.2, r * 0.8); // Outer back
      ctx.bezierCurveTo(-r * 0.4, r * 0.2, -r * 0.2, 0, r * 0.4, -r * 0.3); // Inner belly
      ctx.fill();
      ctx.stroke();

      // Segment lines
      ctx.beginPath();
      ctx.moveTo(-r * 0.2, -r * 0.5); ctx.lineTo(0, -r * 0.1);
      ctx.moveTo(-r * 0.5, -r * 0.1); ctx.lineTo(-r * 0.2, r * 0.2);
      ctx.moveTo(-r * 0.4, r * 0.4); ctx.lineTo(-r * 0.1, r * 0.6);
      ctx.stroke();

      // Legs
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        let lx = -r * 0.2 + i * (r * 0.15);
        let ly = r * 0.2 + (i * 0.05);
        ctx.moveTo(lx, ly);
        ctx.lineTo(lx - r * 0.1, ly + r * 0.2);
      }
      ctx.stroke();

      // Eye
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(r * 0.25, -r * 0.2, r * 0.06, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    /**
     * [시그니처 김치 아이콘 함수]
     */
    function drawSignatureKimchi(ctx, x, y, r) {
      ctx.save();
      ctx.translate(x, y);

      // 배경 접시 (연한 하늘색)
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.2, 0, Math.PI * 2);
      ctx.fillStyle = '#f0f7ff';
      ctx.fill();

      // 배추 몸통 (삐죽삐죽한 물결 테두리)
      ctx.beginPath();
      const points = 20;
      for (let i = 0; i <= points; i++) {
        let angle = (i / points) * Math.PI * 2;
        // 반지름에 변화를 주어 물결 모양 생성
        let wave = (i % 2 === 0) ? 0.92 : 1.05;
        let rx = Math.cos(angle) * r * 0.85 * wave;
        let ry = Math.sin(angle) * r * 1.1 * wave; // 약간 길쭉한 배추 형태
        if (i === 0) ctx.moveTo(rx, ry);
        else ctx.lineTo(rx, ry);
      }
      ctx.closePath();
      ctx.fillStyle = '#E53935';
      ctx.fill();

      // 중앙 잎맥 (연한 핑크/오렌지)
      ctx.strokeStyle = '#ffccbc';
      ctx.lineWidth = r * 0.15;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, r * 0.8);
      ctx.lineTo(0, -r * 0.8); // 중심 줄기
      ctx.stroke();

      // 잔가지 잎맥
      ctx.lineWidth = r * 0.06;
      for (let j = -2; j <= 2; j++) {
        let h = j * r * 0.3;
        ctx.beginPath();
        ctx.moveTo(0, h);
        ctx.lineTo(-r * 0.4, h - r * 0.2);
        ctx.moveTo(0, h);
        ctx.lineTo(r * 0.4, h - r * 0.2);
        ctx.stroke();
      }

      // 고명 (초록 쪽파 & 검붉은 고춧가루)
      for (let k = 0; k < 12; k++) {
        ctx.fillStyle = (k % 2 === 0) ? '#4CAF50' : '#8B0000';
        let gx = (Math.random() - 0.5) * r * 1.1;
        let gy = (Math.random() - 0.5) * r * 1.1;
        ctx.beginPath();
        ctx.arc(gx, gy, r * 0.05, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawSeasoning(ctx, x, y, r) {
      ctx.save();
      ctx.translate(x, y);
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#FFD700';

      ctx.fillStyle = '#FFF9C4';
      ctx.beginPath();
      ctx.arc(-r * 0.4, -r * 0.2, r * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(r * 0.2, -r * 0.4, r * 0.25, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#D32F2F';
      ctx.beginPath();
      ctx.arc(0, r * 0.3, r * 0.35, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawKimchiJar(ctx, x, y, r, colorObj, age, level) {
      ctx.save();
      ctx.translate(x, y);
      let s = 1.3 + ((level || 1) - 1) * 0.3;
      ctx.scale(s, s);

      let type = colorObj.type;
      if (type === 'BAECHU' && age >= 10000) {
        ctx.shadowBlur = 15; ctx.shadowColor = '#FFD700';
      } else if (type === 'YEOLMU' && age <= 4000) {
        ctx.shadowBlur = 15; ctx.shadowColor = '#00FF00';
      } else if (type === 'DONGCHIMI' && age >= 5000 && age <= 10000) {
        ctx.shadowBlur = 15; ctx.shadowColor = '#00FFFF';
      } else if (type === 'CHONGGAK' && age >= 4000 && age <= 8000) {
        ctx.shadowBlur = 15; ctx.shadowColor = '#FFA500';
      } else if (type === 'KKAKDUGI' && age >= 6000 && age <= 12000) {
        ctx.shadowBlur = 15; ctx.shadowColor = '#FF0000';
      }

      drawKimchi(ctx, 0, 0, r, colorObj);
      ctx.restore();
    }

    function drawIngredient(ctx, x, y, r, colorObj) {
      ctx.save();
      ctx.translate(x, y);

      // 1. Base color
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = colorObj.hex;
      ctx.fill();

      // 2. Unique texture based on kimchi type
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.clip(); // Ensure patterns don't bleed outside the bead

      let type = colorObj.type;
      if (type === 'BAECHU') {
        // Cabbage: Wavy vertical leaf veins
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.lineWidth = r * 0.12;
        ctx.beginPath();
        ctx.moveTo(-r * 0.2, -r); ctx.quadraticCurveTo(-r * 0.6, 0, -r * 0.2, r);
        ctx.moveTo(r * 0.2, -r); ctx.quadraticCurveTo(r * 0.6, 0, r * 0.2, r);
        ctx.moveTo(0, -r); ctx.lineTo(0, r);
        ctx.stroke();
      } else if (type === 'KKAKDUGI') {
        // Radish Cube: Faint square shape
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.lineWidth = r * 0.08;
        let sz = r * 0.45;
        ctx.fillRect(-sz, -sz, sz * 2, sz * 2);
        ctx.strokeRect(-sz, -sz, sz * 2, sz * 2);
      } else if (type === 'YEOLMU') {
        // Green Stem: Diagonal lines
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.lineWidth = r * 0.15;
        ctx.beginPath();
        ctx.moveTo(-r, -r); ctx.lineTo(r, r);
        ctx.moveTo(-r * 0.5, -r); ctx.lineTo(r, r * 0.5);
        ctx.moveTo(-r, -r * 0.5); ctx.lineTo(r * 0.5, r);
        ctx.stroke();
      } else if (type === 'CHONGGAK') {
        // Whole Radish: Horizontal curves
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.lineWidth = r * 0.1;
        ctx.beginPath();
        for (let i = -r * 0.6; i <= r * 0.6; i += r * 0.4) {
          ctx.moveTo(-r, i); ctx.quadraticCurveTo(0, i + r * 0.3, r, i);
        }
        ctx.stroke();
      } else if (type === 'DONGCHIMI') {
        // Ice/Cross-section: Concentric circles
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.lineWidth = r * 0.15;
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.4, 0, Math.PI * 2);
        ctx.arc(0, 0, r * 0.8, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();

      // 3. Glossy highlight (Overlay)
      let gloss = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, -r * 0.3, -r * 0.3, r * 0.8);
      gloss.addColorStop(0, 'rgba(255, 255, 255, 0.6)');
      gloss.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = gloss;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawTraditionalBox(ctx, boxX, boxY, boxW, boxH) {
      ctx.save();
      // Base background & Border
      ctx.fillStyle = 'rgba(40, 15, 10, 0.95)';
      ctx.strokeStyle = '#D4AF37';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 10);
      ctx.fill(); ctx.stroke();

      // Subtle Watermark (Concentric circles)
      ctx.clip(); // Keep watermark inside the box
      ctx.beginPath();
      ctx.arc(boxX + boxW / 2, boxY + boxH / 2, boxW * 0.4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 215, 0, 0.04)';
      ctx.lineWidth = 20;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(boxX + boxW / 2, boxY + boxH / 2, boxW * 0.2, 0, Math.PI * 2);
      ctx.stroke();

      // Inner Border
      ctx.strokeStyle = 'rgba(212, 175, 55, 0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(boxX + 12, boxY + 12, boxW - 24, boxH - 24);

      // Traditional Corner Ornaments
      let corners = [
        [boxX + 6, boxY + 6, 1, 1],
        [boxX + boxW - 6, boxY + 6, -1, 1],
        [boxX + 6, boxY + boxH - 6, 1, -1],
        [boxX + boxW - 6, boxY + boxH - 6, -1, -1]
      ];
      ctx.fillStyle = '#D4AF37';
      corners.forEach(c => {
        let cx = c[0], cy = c[1], dx = c[2], dy = c[3];
        let sz = 16;
        ctx.fillRect(cx, cy, sz * dx, 3 * dy);
        ctx.fillRect(cx, cy, 3 * dx, sz * dy);
        ctx.beginPath();
        ctx.arc(cx + 8 * dx, cy + 8 * dy, 2, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    }

    function drawRanking(ctx) {
      ctx.fillStyle = 'rgba(30, 20, 10, 0.95)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      let boxW = 320; let boxH = 480;
      let boxX = canvas.width / 2 - boxW / 2;
      let boxY = canvas.height / 2 - boxH / 2;

      drawTraditionalBox(ctx, boxX, boxY, boxW, boxH);

      ctx.textAlign = 'center';
      ctx.font = 'bold 26px serif';
      ctx.fillStyle = '#FFD700';
      ctx.fillText('🏆 명예의 전당', canvas.width / 2, boxY + 50);

      ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(boxX + 30, boxY + 70); ctx.lineTo(boxX + boxW - 30, boxY + 70); ctx.stroke();
      ctx.fillStyle = '#D4AF37';
      ctx.save(); ctx.translate(canvas.width / 2, boxY + 70); ctx.rotate(Math.PI / 4);
      ctx.fillRect(-5, -5, 10, 10);
      ctx.restore();

      if (!rankingsData) {
        ctx.font = '18px sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText('랭킹 정보를 불러오는 중...', canvas.width / 2, boxY + 220);
      } else {
        ctx.save();
        // Clip the scrollable list area
        ctx.beginPath();
        ctx.rect(boxX, boxY + 80, boxW, boxH - 120);
        ctx.clip();

        ctx.translate(0, rankingScrollOffset);

        for (let i = 0; i < rankingsData.length; i++) {
          let r = rankingsData[i];
          let y = boxY + 110 + (i * 60); // Increased spacing for 2 lines

          let titleStr = '';
          let titleColor = '';
          if (i === 0) { titleStr = '장원'; titleColor = '#FFD700'; }
          else if (i === 1) { titleStr = '방안'; titleColor = '#C0C0C0'; }
          else if (i === 2) { titleStr = '탐화'; titleColor = '#cd7f32'; }
          else { titleStr = '급제'; titleColor = '#A0A0A0'; } // Ink/Silver-grey

          // Line 1: Title. Name - Score
          ctx.textAlign = 'left';
          ctx.font = 'bold 18px serif';
          ctx.fillStyle = titleColor;
          ctx.fillText(`[${titleStr}] ${r.name}`, boxX + 24, y);

          ctx.textAlign = 'right';
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 16px sans-serif';
          ctx.fillText(`${r.score.toLocaleString()} 점`, boxX + boxW - 24, y);

          // Line 2: Kimchi Stats Breakdown
          ctx.textAlign = 'left';
          ctx.font = '13px sans-serif';
          ctx.fillStyle = '#d2b48c';

          let statStr = "기록 없음";
          if (r.kimchiStats) {
            let total = Object.values(r.kimchiStats).reduce((sum, val) => sum + val, 0);
            let b = r.kimchiStats.BAECHU || 0;
            let d = r.kimchiStats.DONGCHIMI || 0;
            let yl = r.kimchiStats.YEOLMU || 0;
            let c = r.kimchiStats.CHONGGAK || 0;
            let k = r.kimchiStats.KKAKDUGI || 0;
            statStr = `배추${b} 동치미${d} 열무${yl} 총각${c} 깍두기${k} (총 ${total}포기)`;
          }
          ctx.fillText(statStr, boxX + 24, y + 20);
        }
        ctx.restore();

        // Fading top/bottom edges of the scroll area
        ctx.fillStyle = 'rgba(40, 15, 10, 0.8)';
        ctx.fillRect(boxX, boxY + 80, boxW, 10);
        ctx.fillRect(boxX, boxY + boxH - 50, boxW, 10);
      }

      ctx.textAlign = 'center';
      ctx.fillStyle = '#d2b48c';
      ctx.font = '16px sans-serif';
      ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 200);
      ctx.fillText('화면을 터치하여 돌아가기', canvas.width / 2, boxY + boxH - 25);
      ctx.globalAlpha = 1.0;
    }

    function drawTutorial(ctx) {
      ctx.fillStyle = 'rgba(30, 20, 10, 0.95)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      let boxW = 320; let boxH = 400;
      let boxX = canvas.width / 2 - boxW / 2;
      let boxY = canvas.height / 2 - boxH / 2;

      drawTraditionalBox(ctx, boxX, boxY, boxW, boxH);

      let data = tutorialData[currentTutorialPage];

      ctx.textAlign = 'center';
      ctx.font = 'bold 24px serif';
      ctx.fillStyle = '#FFD700';
      ctx.fillText(data.title, canvas.width / 2, boxY + 50);

      ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(boxX + 30, boxY + 70); ctx.lineTo(boxX + boxW - 30, boxY + 70); ctx.stroke();
      ctx.fillStyle = '#D4AF37';
      ctx.save(); ctx.translate(canvas.width / 2, boxY + 70); ctx.rotate(Math.PI / 4);
      ctx.fillRect(-5, -5, 10, 10);
      ctx.restore();

      ctx.font = '18px sans-serif';
      ctx.fillStyle = '#fff';
      let lines = data.body.split('\n');
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], canvas.width / 2, boxY + 130 + (i * 32));
      }

      ctx.fillStyle = '#d2b48c';
      ctx.font = '16px sans-serif';
      ctx.fillText(`${currentTutorialPage + 1} / ${tutorialData.length}`, canvas.width / 2, boxY + boxH - 60);

      ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 200);
      ctx.fillText('화면을 터치하여 다음으로', canvas.width / 2, boxY + boxH - 25);
      ctx.globalAlpha = 1.0;
    }

    /**
     * [렌더링]
     */
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (gameState === STATE.RANKING) {
        drawRanking(ctx);
        return;
      }

      if (gameState === STATE.MENU) {
        ctx.fillStyle = 'rgba(30, 20, 10, 0.95)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const time = Date.now() / 250;

        ctx.font = '30px sans-serif';
        ctx.fillText('🧊', canvas.width / 2 - 80, canvas.height / 2 - 100 + Math.sin(time) * 10);
        ctx.fillText('🟧', canvas.width / 2 + 80, canvas.height / 2 - 80 + Math.cos(time) * 10);
        ctx.fillText('🌿', canvas.width / 2 - 40, canvas.height / 2 - 130 + Math.sin(time * 1.5) * 15);

        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2 - 50);
        let s = 1 + Math.sin(time) * 0.08;
        ctx.scale(s, s);

        ctx.strokeStyle = '#e6c200';
        ctx.lineWidth = 2;

        drawSignatureKimchi(ctx, 0, -50, 80);

        // 떠다니는 5가지 김치 오르빗 애니메이션
        const orbitRadius = 130 + Math.sin(time) * 10;
        const orbiterRadius = 25;
        for (let i = 0; i < CONFIG.COLORS.length; i++) {
          let angle = (i / CONFIG.COLORS.length) * Math.PI * 2 + (time * 0.2);
          let orbitX = Math.cos(angle) * orbitRadius;
          let orbitY = -50 + Math.sin(angle) * orbitRadius;
          drawKimchi(ctx, orbitX, orbitY, orbiterRadius, CONFIG.COLORS[i]);
        }

        ctx.font = 'bold 45px serif';
        ctx.fillStyle = '#E53935';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 6;
        ctx.strokeText('KIMCHI POP', 0, 70);
        ctx.fillText('KIMCHI POP', 0, 70);
        ctx.restore();

        ctx.fillStyle = '#d2b48c';
        ctx.font = 'bold 20px sans-serif';
        ctx.globalAlpha = 0.5 + 0.5 * Math.sin(time * 2);
        ctx.fillText('화면을 터치하여 김장 시작', canvas.width / 2, canvas.height / 2 + 60);
        ctx.globalAlpha = 1.0;

        // Royal Scroll Help Button
        let helpY = canvas.height / 2 + 130;
        let rankY = canvas.height / 2 + 200;

        ctx.save();
        // Scroll Paper
        ctx.fillStyle = '#F5F5DC'; // Parchment
        ctx.fillRect(canvas.width / 2 - 120, helpY - 20, 240, 40);
        ctx.fillRect(canvas.width / 2 - 120, rankY - 20, 240, 40);
        // Scroll Rollers
        ctx.fillStyle = '#8B0000'; // Dark Red wood
        ctx.beginPath(); ctx.roundRect(canvas.width / 2 - 130, helpY - 25, 10, 50, 5); ctx.fill();
        ctx.beginPath(); ctx.roundRect(canvas.width / 2 + 120, helpY - 25, 10, 50, 5); ctx.fill();
        ctx.beginPath(); ctx.roundRect(canvas.width / 2 - 130, rankY - 25, 10, 50, 5); ctx.fill();
        ctx.beginPath(); ctx.roundRect(canvas.width / 2 + 120, rankY - 25, 10, 50, 5); ctx.fill();

        ctx.font = 'bold 18px serif';
        ctx.fillStyle = '#0B0B0B'; // Ink black
        ctx.fillText(' 어명: 수라간 비법 하사', canvas.width / 2, helpY + 6);
        ctx.fillText('🏆 선발: 수라간 장원급제록', canvas.width / 2, rankY + 6);
        ctx.restore();

        return;
      }

      ctx.fillStyle = 'rgba(80, 50, 30, 0.3)';
      ctx.strokeStyle = '#4a2c16';
      ctx.lineWidth = 12;
      ctx.beginPath();
      const tY = canvas.height * 0.35; // Top
      const bY = canvas.height - FLOOR_MARGIN; // Bottom
      ctx.moveTo(JAR_MARGIN - 5, tY);
      // Left Belly -> Bottom -> Right Belly
      ctx.bezierCurveTo(JAR_MARGIN - 25, tY + 100, JAR_MARGIN - 25, bY - 30, JAR_MARGIN - 5, bY + 15);
      ctx.lineTo(canvas.width - JAR_MARGIN + 5, bY + 15);
      ctx.bezierCurveTo(canvas.width - JAR_MARGIN + 25, bY - 30, canvas.width - JAR_MARGIN + 25, tY + 100, canvas.width - JAR_MARGIN + 5, tY);
      ctx.fill();
      ctx.stroke();
      // Rim detail
      ctx.strokeRect(JAR_MARGIN - 10, tY - 10, (canvas.width - JAR_MARGIN * 2) + 20, 15);

      // 위험 경고 라인 그리기 (타이머 작동 시 붉게 점멸)
      if (gameOverTimer > 0) {
        ctx.save();
        ctx.strokeStyle = `rgba(255, 0, 0, ${0.3 + 0.7 * Math.sin(Date.now() / 100)})`;
        ctx.lineWidth = 3;
        ctx.setLineDash([10, 5]);
        ctx.beginPath();
        ctx.moveTo(JAR_MARGIN, canvas.height * 0.35);
        ctx.lineTo(canvas.width - JAR_MARGIN, canvas.height * 0.35);
        ctx.stroke();
        ctx.restore();
      }

      // 구슬 렌더링
      for (let i = 0; i < balls.length; i++) {
        let b = balls[i];
        if (b.type === 'RAW') {
          drawIngredient(ctx, b.x, b.y, b.r, b.colorObj);
        } else if (b.type === 'GARLIC') {
          drawGarlic(ctx, b.x, b.y, b.r);
        } else if (b.type === 'SHRIMP') {
          drawShrimp(ctx, b.x, b.y, b.r);
        } else if (b.type === 'KIMCHI_JAR') {
          drawKimchiJar(ctx, b.x, b.y, b.r, b.colorObj, Date.now() - b.spawnTime, b.level || 1);
        }
      }

      // Swipe 연결선 및 하이라이트 효과 렌더링
      if (gameState === STATE.PLAYING && isSwiping && selectedBalls.length > 0) {
        // 연결선 그림
        ctx.beginPath();
        ctx.strokeStyle = currentSwipeColor.hex;
        ctx.lineWidth = 12;
        ctx.lineJoin = 'round';
        ctx.globalAlpha = 0.6;
        for (let i = 0; i < selectedBalls.length; i++) {
          let b = selectedBalls[i];
          if (i === 0) ctx.moveTo(b.x, b.y);
          else ctx.lineTo(b.x, b.y);
        }
        ctx.stroke();

        // 선택된 구슬 강조 (글로우)
        ctx.globalAlpha = 1.0;
        for (let i = 0; i < selectedBalls.length; i++) {
          let b = selectedBalls[i];
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r + 5, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
          ctx.lineWidth = 4;
          ctx.stroke();
        }
      }

      particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.colorHex;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1.0;

      floatingTexts.forEach(ft => {
        ctx.globalAlpha = Math.max(0, ft.life);
        ctx.fillStyle = ft.color;
        ctx.strokeStyle = '#2b1d14';
        ctx.lineWidth = 4;
        ctx.font = `bold ${ft.size}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.strokeText(ft.text, ft.x, ft.y);
        ctx.fillText(ft.text, ft.x, ft.y);
      });
      ctx.globalAlpha = 1.0;

      // 인벤토리 UI 제거됨

      // UI 렌더링 (플레이/엔딩 공통 상단 UI)
      if (gameState === STATE.PLAYING || gameState === STATE.ENDING) {
        // 상단 바 배경 (짙은 나무색)
        ctx.fillStyle = '#3e2723';
        ctx.fillRect(0, 0, canvas.width, 60);

        // 안쪽 테두리 장식
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 2;
        ctx.strokeRect(4, 4, canvas.width - 8, 52);

        // 전통 격자 무늬 바닥 선 장식
        ctx.strokeStyle = '#d2b48c';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i < canvas.width; i += 12) {
          ctx.moveTo(i, 54);
          ctx.lineTo(i + 6, 60);
          ctx.moveTo(i + 6, 54);
          ctx.lineTo(i, 60);
        }
        ctx.stroke();

        // 텍스트 스타일: 붓글씨 느낌의 세리프 폰트와 금색
        ctx.fillStyle = '#ffecb3';
        ctx.textAlign = 'left';

        // 1번째 줄: 페이즈 & 점수
        ctx.font = 'bold 15px serif';
        ctx.fillText(`Phase: ${currentPhase} | Score: ${totalScore.toLocaleString()}`, 10, 24);

        // 2번째 줄: 시간
        ctx.font = '14px serif';
        ctx.fillText(`Survive: ${(currentStageTime / 1000).toFixed(1)}s`, 10, 46);

        ctx.textAlign = 'right';
        ctx.font = 'bold 16px serif';

        if (gameState === STATE.PLAYING) {
          let btnW = 60; let btnH = 32;
          let btnX = canvas.width - btnW - 10;
          let btnY = 14;

          ctx.fillStyle = '#5d4037';
          ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 5); ctx.fill();
          ctx.strokeStyle = '#d2b48c';
          ctx.lineWidth = 1;
          ctx.stroke();

          ctx.textAlign = 'center';
          ctx.fillStyle = '#ffecb3';
          ctx.font = 'bold 14px sans-serif';
          ctx.fillText('홈으로', btnX + btnW / 2, btnY + 21);
        }

        ctx.textBaseline = 'alphabetic'; // Reset for rest of app
      }

      if (gameState === STATE.ENDING) {
        ctx.fillStyle = 'rgba(43, 29, 20, 0.98)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawTaegeuk(ctx, canvas.width / 2, canvas.height / 2, Math.min(canvas.width, canvas.height) * 0.35);

        // Report Panel glowing gold border
        let boxW = 340;
        let boxH = 430;
        let boxX = canvas.width / 2 - boxW / 2;
        let boxY = canvas.height / 2 - boxH / 2 - 20;

        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#FFD700';
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxW, boxH, 15);
        ctx.stroke();
        ctx.restore();

        ctx.textAlign = 'center';
        ctx.font = 'bold 32px sans-serif';
        ctx.fillStyle = '#FFD700';
        ctx.fillText('김장 결과 보고서', canvas.width / 2, boxY + 60);

        // Score
        ctx.font = 'bold 28px sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText(`최종 점수: ${totalScore.toLocaleString()}점`, canvas.width / 2, boxY + 110);

        // Top Divider
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(boxX + 30, boxY + 140);
        ctx.lineTo(boxX + boxW - 30, boxY + 140);
        ctx.stroke();

        // Subtitle
        ctx.font = 'bold 18px sans-serif';
        ctx.fillStyle = '#d2b48c';
        ctx.fillText('상세 내역', canvas.width / 2, boxY + 175);

        // Vertical List
        let totalKimchi = 0;
        let listY = boxY + 210;

        CONFIG.COLORS.forEach((c, idx) => {
          let count = kimchiStats[c.type] || 0;
          totalKimchi += count;
          let yPos = listY + (idx * 32);

          // Left align: Kimchi Name
          ctx.textAlign = 'left';
          ctx.font = 'bold 18px sans-serif';
          ctx.fillStyle = c.hex;
          ctx.fillText(c.name, canvas.width / 2 - 90, yPos);

          // Right align: Count
          ctx.textAlign = 'right';
          ctx.font = '18px sans-serif';
          ctx.fillStyle = '#fff';
          ctx.fillText(`${count} 포기`, canvas.width / 2 + 90, yPos);
        });

        // Bottom Divider
        ctx.beginPath();
        ctx.moveTo(boxX + 30, listY + 160);
        ctx.lineTo(boxX + boxW - 30, listY + 160);
        ctx.stroke();

        // Total Summary
        ctx.textAlign = 'center';
        ctx.font = 'bold 24px sans-serif';
        ctx.fillStyle = '#FFD700';
        ctx.fillText(`총 ${totalKimchi}포기 완성!`, canvas.width / 2, listY + 205);

        if (endingTimer > 1000) {
          if (!isScoreSaved) {
            let btnY = boxY + boxH + 25;
            ctx.save();
            ctx.fillStyle = '#F5F5DC';
            ctx.fillRect(canvas.width / 2 - 120, btnY - 20, 240, 40);
            ctx.fillStyle = '#8B0000';
            ctx.beginPath(); ctx.roundRect(canvas.width / 2 - 130, btnY - 25, 10, 50, 5); ctx.fill();
            ctx.beginPath(); ctx.roundRect(canvas.width / 2 + 120, btnY - 25, 10, 50, 5); ctx.fill();
            ctx.font = 'bold 18px serif';
            ctx.fillStyle = '#0B0B0B';
            ctx.fillText('📜 내 김장 실력 등록하기', canvas.width / 2, btnY + 6);
            ctx.restore();
          }

          ctx.fillStyle = '#d2b48c';
          ctx.font = 'bold 16px sans-serif';
          ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 200);
          let restartY = boxY + boxH + (isScoreSaved ? 40 : 90);
          ctx.fillText('화면을 터치하여 처음으로', canvas.width / 2, restartY);
          ctx.globalAlpha = 1.0;
        }
      }

      if (gameState === STATE.READY) {
        ctx.fillStyle = '#fff';
        ctx.font = '40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('READY...', canvas.width / 2, canvas.height / 2);
      }

      // Removed STAGE_CLEAR UI

      if (gameState === STATE.TUTORIAL) {
        drawTutorial(ctx);
      }
      if (gameState === STATE.RANKING) drawRanking(ctx);
    }

    /**
     * [메인 루프]
     */
    function tick(timestamp) {
      let dt = timestamp - lastTime;
      lastTime = timestamp;

      if (gameState === STATE.ENDING) {
        endingTimer += dt;
      }

      if (gameState === STATE.PLAYING) {
        currentStageTime += dt;
        phaseTimer += dt;

        if (phaseTimer > 30000) {
          phaseTimer -= 30000;
          currentPhase++;

          if (currentPhase === 2) {
            baseFallSpeed = 4;
            baseSpawnInterval = 800;
            showToast(`제 ${currentPhase} 장 - 수라간 열기 상승!`);
          } else if (currentPhase === 3) {
            let available = CONFIG.COLORS.filter(c => !currentColors.some(cc => cc.type === c.type));
            if (available.length > 0) {
              currentColors.push(available[Math.floor(Math.random() * available.length)]);
            }
            baseFallSpeed = 5;
            baseSpawnInterval = 650;
            showToast(`제 ${currentPhase} 장 - 세 번째 재료 등장!`);
          } else {
            baseFallSpeed = Math.min(13, baseFallSpeed + 1.2);
            baseSpawnInterval = Math.max(200, baseSpawnInterval * 0.85);
            showToast(`제 ${currentPhase} 장 - 낙하 속도 및 물량 폭발!`);
          }

          if (!freezeTimeout) {
            FALL_SPEED = baseFallSpeed;
            currentSpawnInterval = baseSpawnInterval;
          }
        }

        spawnTimer += dt;
        if (spawnTimer > currentSpawnInterval) {
          spawnTimer = 0;
          for (let k = 0; k < 2; k++) {
            let randomColor = currentColors[Math.floor(Math.random() * currentColors.length)];
            let spawnX = JAR_MARGIN + 40 + Math.random() * (canvas.width - JAR_MARGIN * 2 - 80);
            let newBall = new Ball(spawnX, -50 - (k * 40), CONFIG.BALL_RADIUS, randomColor);
            newBall.vy = FALL_SPEED;
            balls.push(newBall);
          }
        }

        updatePhysics(dt);

        // All Clear Bonus Check
        if (balls.length === 0) {
          showToast('🏆 장독대 완벽 청소!\n+5,000 보너스 및 재료 폭포!');
          totalScore += 5000;

          // Cancel Freeze effect if active so balls can fall fast
          if (freezeTimeout) {
            clearTimeout(freezeTimeout);
            freezeTimeout = null;
            FALL_SPEED = baseFallSpeed;
            currentSpawnInterval = baseSpawnInterval;
          }

          // Instantly drop 15 balls at once (scattered Y positions)
          for (let i = 0; i < 15; i++) {
            let randomColor = currentColors[Math.floor(Math.random() * currentColors.length)];
            let spawnX = JAR_MARGIN + 40 + Math.random() * (canvas.width - JAR_MARGIN * 2 - 80);
            let spawnY = -50 - (Math.random() * 300);
            let newBall = new Ball(spawnX, spawnY, CONFIG.BALL_RADIUS, randomColor);
            newBall.vy = Math.max(FALL_SPEED, 8) + Math.random() * 5;
            balls.push(newBall);
          }
          spawnTimer = 0;
        }

        if (checkGameOver()) {
          gameOverTimer += dt;
          if (gameOverTimer > 3000) { // 3초 동안 위험 상태 지속 시 종료
            gameState = STATE.ENDING;
            endingTimer = 0;
            gameOverTimer = 0;
            checkAndSaveBestSurvival();
            showToast('🛑 게임 오버! 항아리가 넘쳤습니다.');
          }
        } else {
          gameOverTimer = 0; // 위험 구역에서 벗어나면 타이머 초기화
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.life -= 0.05;
        if (p.life <= 0) particles.splice(i, 1);
      }

      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        let ft = floatingTexts[i];
        ft.y += ft.vy;
        ft.life -= 0.015;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
      }

      draw();
      requestAnimationFrame(tick); // 루프는 절대 끊지 않음
    }

    /**
     * [입력 라우팅]
     */
    canvas.addEventListener('pointerdown', (e) => {
      if (gameState === STATE.MENU) {
        const rect = canvas.getBoundingClientRect();
        const touchY = e.clientY - rect.top;
        const helpY = canvas.height / 2 + 160;
        const rankY = canvas.height / 2 + 200;

        if (Math.abs(touchY - helpY) < 30) {
          gameState = STATE.TUTORIAL; currentTutorialPage = 0; return;
        }
        if (Math.abs(touchY - rankY) < 30) {
          gameState = STATE.RANKING; rankingsData = null;
          window.getFirebaseRankings().then(data => { rankingsData = data; });
          return;
        }

        if (!hasSeenTutorial) { gameState = STATE.TUTORIAL; currentTutorialPage = 0; }
        else { agingMultiplier = 1.0; startGame(); }
        return;
      } else if (gameState === STATE.TUTORIAL) {
        currentTutorialPage++;
        if (navigator.vibrate) navigator.vibrate(20);
        if (currentTutorialPage >= tutorialData.length) {
          localStorage.setItem('kimchiPopTutorialSeen', 'true');
          hasSeenTutorial = true;
          agingMultiplier = 1.0;
          startGame();
        }
        return;
      }

      if (gameState === STATE.ENDING) {
        if (endingTimer > 1000) {
          const rect = canvas.getBoundingClientRect();
          const touchY = e.clientY - rect.top;
          let boxH = 430; let boxY = canvas.height / 2 - boxH / 2 - 20;

          if (!isScoreSaved && Math.abs(touchY - (boxY + boxH + 25)) < 30) {
            let savedName = localStorage.getItem('kimchiPopLastNickname') || "수라간장인";
            let name = prompt("명예의 전당 닉네임 (한글 2~5자, 자음/모음 단독 불가):", savedName);

            if (name !== null) {
              name = name.trim();
              const nameRegex = /^[가-힣]{2,5}$/;
              const bannedWords = ['바보', '멍청이', '시발', '씨발', '병신', '개새', '쓰레기', '지랄', '좆', '애미', '느금', '섹스', '스섹', '색스', '섹수', '섹슷', '샛스', '셋스', '보지', '자지', '봊이', '잦이'];

              let isValid = true;

              if (!nameRegex.test(name)) {
                alert('경고: 닉네임은 완성된 한글 2자~5자로만 입력해야 합니다. (특수문자, 숫자, 자음/모음 단독 사용 불가)');
                isValid = false;
              } else {
                for (let word of bannedWords) {
                  if (name.includes(word)) {
                    alert('경고: 사용할 수 없는 단어가 포함되어 있습니다.');
                    isValid = false;
                    break;
                  }
                }
              }

              if (isValid) {
                localStorage.setItem('kimchiPopLastNickname', name);
                isScoreSaved = true; // Hide button immediately to prevent spam clicks

                window.saveFirebaseScore(name, totalScore, kimchiStats).then(result => {
                  showToast(result.message);
                });
              }
            }
            return;
          }
          gameState = STATE.MENU;
        }
        return;
      }

      if (gameState === STATE.RANKING) {
        let boxH = 480;
        let boxY = canvas.height / 2 - boxH / 2;
        const rect = canvas.getBoundingClientRect();
        const touchY = e.clientY - rect.top;

        // Check if tapping outside the box or on the bottom text to return
        if (touchY < boxY || touchY > boxY + boxH || Math.abs(touchY - (boxY + boxH - 25)) < 30) {
          gameState = STATE.MENU;
          return;
        }

        isRankingScrolling = true;
        rankingStartY = touchY;
        return;
      }

      if (gameState === STATE.PLAYING) {
        const rect = canvas.getBoundingClientRect();
        const touchX = e.clientX - rect.left;
        const touchY = e.clientY - rect.top;

        let btnW = 60; let btnH = 32;
        let btnX = canvas.width - btnW - 10;
        let btnY = 14;

        // Check if Home button is tapped
        if (touchX >= btnX && touchX <= btnX + btnW && touchY >= btnY && touchY <= btnY + btnH) {
          if (confirm("김장을 중단하고 메인 화면으로 돌아가시겠습니까?\n(현재 기록은 저장되지 않습니다)")) {
            gameState = STATE.MENU;
          }
          return; // Consume the touch event
        }

        selectedBalls = [];

        // 뒤에서부터 순회 (화면상 앞쪽에 렌더링된 구슬 먼저 터치 판정)
        for (let i = balls.length - 1; i >= 0; i--) {
          let b = balls[i];
          let dx = touchX - b.x;
          let dy = touchY - b.y;
          if (Math.sqrt(dx * dx + dy * dy) <= b.r + 10) {
            if (b.type === 'GARLIC' || b.type === 'SHRIMP' || b.type === 'KIMCHI_JAR') {
              let effectBalls = [];
              let age = Date.now() - b.spawnTime;
              let isMassive = false;
              let lvl = b.level || 1;
              let rMult = lvl === 3 ? 2.0 : (lvl === 2 ? 1.5 : 1.0);

              if (b.type === 'GARLIC') {
                showToast('🧄 귀한 의성 마늘 득템!\n숙성 시간이 3초 단축됩니다.');
                balls.forEach(obj => { if (obj.type === 'KIMCHI_JAR') obj.spawnTime -= 3000; });
                effectBalls = balls.filter(obj => Math.hypot(obj.x - b.x, obj.y - b.y) < 80);
              } else if (b.type === 'SHRIMP') {
                showToast('🦐 최상급 광천 새우젓 득템!\n숙성 시간이 5초 단축됩니다.');
                balls.forEach(obj => { if (obj.type === 'KIMCHI_JAR') obj.spawnTime -= 5000; });
                effectBalls = balls.filter(obj => Math.hypot(obj.x - b.x, obj.y - b.y) < 100);
              } else {
                let type = b.colorObj.type;
                if (type === 'BAECHU' && age >= 10000) {
                  showToast(`🔥 묵은지 대폭발! (Lv.${lvl})`);
                  effectBalls = balls.filter(obj => obj.type === 'RAW');
                  isMassive = true;
                } else if (type === 'YEOLMU' && age <= 4000) {
                  // Find active colors that are NOT Yeolmu
                  let otherColors = currentColors.filter(c => c.type !== 'YEOLMU');
                  // Fallback to its own color only if it's the only color left (edge case)
                  let targetColor = otherColors.length > 0 ? otherColors[Math.floor(Math.random() * otherColors.length)] : b.colorObj;

                  showToast(`🌿 생열무의 헌신! (${targetColor.name} 지원, Lv.${lvl})`);

                  // Filter raw balls that are not already the target color
                  let raws = balls.filter(obj => obj.type === 'RAW' && obj.colorObj.type !== targetColor.type);
                  // Shuffle the raw balls to convert them randomly across the board
                  raws.sort(() => 0.5 - Math.random());

                  // Convert up to 10 * lvl balls
                  for (let i = 0; i < Math.min(10 * lvl, raws.length); i++) {
                    raws[i].colorObj = targetColor;
                  }
                  effectBalls = [b];
                } else if (type === 'DONGCHIMI' && age >= 5000 && age <= 10000) {
                  showToast(`❄️ 극한의 프리즈! (Lv.${lvl}, ${5 * lvl}초)`);
                  effectBalls = [b];
                  FALL_SPEED = 1; currentSpawnInterval = baseSpawnInterval * 5;
                  if (freezeTimeout) clearTimeout(freezeTimeout);
                  freezeTimeout = setTimeout(() => {
                    freezeTimeout = null;
                    FALL_SPEED = baseFallSpeed;
                    currentSpawnInterval = baseSpawnInterval;
                  }, 5000 * lvl);
                } else if (type === 'CHONGGAK' && age >= 4000 && age <= 8000) {
                  showToast(`⚡ 무청 채찍! (Lv.${lvl}, ${20 * lvl}연타)`);
                  let raws = balls.filter(obj => obj.type === 'RAW');
                  effectBalls = raws.sort(() => 0.5 - Math.random()).slice(0, 20 * lvl);
                  isMassive = true;
                } else if (type === 'KKAKDUGI' && age >= 6000 && age <= 12000) {
                  showToast(`🔥 국밥 연쇄! (Lv.${lvl})`);
                  balls.forEach(obj => { if (obj.type === 'KIMCHI_JAR') obj.spawnTime -= 20000; });
                  effectBalls = balls.filter(obj => Math.hypot(obj.x - b.x, obj.y - b.y) < 150 * rMult);
                } else {
                  effectBalls = balls.filter(obj => Math.hypot(obj.x - b.x, obj.y - b.y) < b.r + 10);
                }
              }

              if (!effectBalls.includes(b)) effectBalls.push(b);

              let popScore = (effectBalls.length * 300 * lvl) + (1000 * lvl);
              totalScore += popScore;
              let popMsg = b.type === 'KIMCHI_JAR' ? `김치 콤보! ${effectBalls.length}combo!` : `아이템 획득! +${popScore}`;
              floatingTexts.push(new FloatingText(b.x, b.y - 20, popMsg, '#FFD700', 20 + lvl * 4));

              let pCount = isMassive ? 2 : 8; // Limit particles for performance

              for (let j = balls.length - 1; j >= 0; j--) {
                if (effectBalls.includes(balls[j])) {
                  for (let k = 0; k < pCount; k++) particles.push(new Particle(balls[j].x, balls[j].y, balls[j].colorObj.hex));
                  balls.splice(j, 1);
                }
              }

              let removedTypes = new Set(effectBalls.map(b => b.colorObj && b.colorObj.type).filter(Boolean));
              checkWipedColors(removedTypes);

              return;
            }

            isSwiping = true;
            selectedBalls.push(b);
            currentSwipeColor = b.colorObj;
            if (navigator.vibrate) navigator.vibrate(40);
            break; // Initiate swipe on the first ball touched
          }
        }
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (gameState === STATE.RANKING && isRankingScrolling) {
        const rect = canvas.getBoundingClientRect();
        const touchY = e.clientY - rect.top;
        let dy = touchY - rankingStartY;
        rankingStartY = touchY;

        rankingScrollOffset += dy;

        // Clamp scrolling
        let maxScroll = 0;
        if (rankingsData && rankingsData.length > 0) {
          let contentHeight = rankingsData.length * 60;
          let viewHeight = 480 - 120; // boxH - 120
          maxScroll = Math.min(0, viewHeight - contentHeight);
        }

        if (rankingScrollOffset > 0) rankingScrollOffset = 0;
        if (rankingScrollOffset < maxScroll) rankingScrollOffset = maxScroll;
        return;
      }

      if (gameState === STATE.PLAYING && isSwiping) {
        const rect = canvas.getBoundingClientRect();
        const touchX = e.clientX - rect.left;
        const touchY = e.clientY - rect.top;

        for (let i = balls.length - 1; i >= 0; i--) {
          let b = balls[i];
          if (b.type !== 'RAW') continue;
          let dx = touchX - b.x;
          let dy = touchY - b.y;

          if (Math.hypot(dx, dy) <= b.r + 20) {
            let lastBall = selectedBalls[selectedBalls.length - 1];
            let prevBall = selectedBalls.length > 1 ? selectedBalls[selectedBalls.length - 2] : null;

            if (b === prevBall) {
              // Backtrack (undo last selection)
              selectedBalls.pop();
              if (navigator.vibrate) navigator.vibrate(20);
              break; // Found a valid interaction, stop searching
            } else if (b.colorObj === currentSwipeColor && !selectedBalls.includes(b)) {
              // Adjacency check (increased from 2.8 to 3.2 for a more forgiving, magnetic feel)
              if (Math.hypot(b.x - lastBall.x, b.y - lastBall.y) <= b.r * 3.2) {
                selectedBalls.push(b);
                if (navigator.vibrate) navigator.vibrate(30);
                break; // Found a valid interaction, stop searching
              }
            }
            // NO UNCONDITIONAL BREAK HERE!
            // If the ball is the wrong color or too far, we ignore it and continue the loop 
            // to check if there is a correct ball underneath it.
          }
        }
      }
    });

    canvas.addEventListener('pointerup', (e) => {
      if (gameState === STATE.PLAYING && isSwiping) {
        isSwiping = false;

        if (selectedBalls.length > 0) {
          let lastBall = selectedBalls[selectedBalls.length - 1];
          let spawnX = lastBall.x;
          let spawnY = lastBall.y;
          let spawnColor = lastBall.colorObj;
          let count = selectedBalls.length;

          // Compute Combination Score Base Points -> Apply Aging Multiplier
          let comboPoints = count < 3 ? count * 10 : count * 40 * agingMultiplier;
          totalScore += Math.floor(comboPoints);

          if (count >= 3) {
            floatingTexts.push(new FloatingText(spawnX, spawnY - 20, `${count}combo! +${Math.floor(comboPoints)}`, spawnColor.hex, Math.min(40, 16 + count * 2)));
          }

          // 배열에서 지운다
          for (let i = 0; i < selectedBalls.length; i++) {
            let b = selectedBalls[i];
            let index = balls.indexOf(b);
            if (index > -1) {
              balls.splice(index, 1);
              // 이펙트
              for (let k = 0; k < 12; k++) {
                particles.push(new Particle(b.x, b.y, b.colorObj.hex));
              }
            }
          }

          let removedTypes = new Set(selectedBalls.map(b => b.colorObj && b.colorObj.type).filter(Boolean));
          checkWipedColors(removedTypes);

          let jarCount = balls.filter(b => b.type === 'KIMCHI_JAR').length;
          let itemCount = balls.filter(b => b.type === 'GARLIC' || b.type === 'SHRIMP').length;

          if (count >= 7) {
            if (jarCount < 3) {
              let newJar = new Ball(spawnX, spawnY, CONFIG.BALL_RADIUS, spawnColor);
              newJar.type = 'KIMCHI_JAR';
              if (count >= 15) newJar.level = 3;
              else if (count >= 11) newJar.level = 2;
              else newJar.level = 1;

              kimchiStats[spawnColor.type] = (kimchiStats[spawnColor.type] || 0) + 1;
              balls.push(newJar);

              let totalCount = kimchiStats[spawnColor.type];
              showToast(`🎉 ${spawnColor.name} 완성! (Lv.${newJar.level}) 🎉\n총 ${totalCount}포기`);
            }
          } else if (count >= 5) {
            if (itemCount < 3) {
              let newItem = new Ball(spawnX, spawnY, CONFIG.BALL_RADIUS, spawnColor);
              newItem.type = Math.random() > 0.5 ? 'GARLIC' : 'SHRIMP';
              balls.push(newItem);
              showToast(newItem.type === 'GARLIC' ? '🧄 귀한 의성 마늘 득템!\n숙성 시간이 3초 단축됩니다.' : '🦐 최상급 광천 새우젓 득템!\n숙성 시간이 5초 단축됩니다.');
            }
          }

          selectedBalls = []; // Reset after processing
        }
      }
      if (gameState === STATE.RANKING) {
        isRankingScrolling = false;
        return;
      }
    });

    canvas.addEventListener('pointerleave', (e) => {
      if (gameState === STATE.RANKING) {
        isRankingScrolling = false;
      }
    });

    canvas.addEventListener('wheel', (e) => {
      if (gameState === STATE.RANKING) {
        rankingScrollOffset -= e.deltaY;

        let maxScroll = 0;
        if (rankingsData && rankingsData.length > 0) {
          let contentHeight = rankingsData.length * 60;
          let viewHeight = 480 - 120; // boxH - 120
          maxScroll = Math.min(0, viewHeight - contentHeight);
        }

        if (rankingScrollOffset > 0) rankingScrollOffset = 0;
        if (rankingScrollOffset < maxScroll) rankingScrollOffset = maxScroll;
      }
    });

    // 시작
    requestAnimationFrame(tick);
  </script>
</body>

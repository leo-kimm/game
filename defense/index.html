<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>타워형 디펜스</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100dvh;
      background: #0f1220;
      color: #e8ecff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .wrap.layout {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .canvas-container {
      flex: 8;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: #05070a;
      overflow: hidden;
    }

    canvas.game {
      background: #0b0e18;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      touch-action: none;
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    .panel.ui {
      flex: 2;
      width: 100%;
      background: #121733;
      border-top: 1px solid rgba(255, 255, 255, .12);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 0 4px;
      color: #ccc;
    }

    .top-bar b {
      color: #fff;
      margin-left: 4px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr) 0.8fr;
      grid-template-rows: 1fr 1fr;
      gap: 6px;
      height: 100%;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, .15);
      background: #171f43;
      color: #e8ecff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: all 0.1s;
    }

    button span.cost {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 2px;
    }

    /* [신규 주입] 설명 문구용 디자인 스펙 */
    button span.desc {
      font-size: 9px;
      color: #aaa;
      font-weight: normal;
      margin-top: 1px;
    }

    button:active {
      transform: scale(0.96);
      background: #222b5e;
    }

    button:disabled {
      opacity: 0.4;
      filter: grayscale(1);
    }

    .btn-on {
      background: #2a3566;
      border-color: #7aa6ff;
      box-shadow: inset 0 0 10px rgba(122, 166, 255, 0.2);
    }

    #startWave {
      grid-column: 4;
      grid-row: 1 / 3;
      background: #1b3a20;
      border-color: #2e5c35;
      font-size: 14px;
      line-height: 1.2;
    }

    #sell {
      grid-column: 1;
      grid-row: 2;
      border-color: #ff7a7a;
      color: #ffd6d6;
    }

    #sell.btn-on {
      background: #4d2020;
    }

    #upgrade {
      grid-column: 2;
      grid-row: 2;
      border-color: #ffd700;
      color: #fff6d6;
    }

    #upgrade.btn-on {
      background: #4d4420;
    }

    #t1 {
      grid-column: 1;
      grid-row: 1;
    }

    #t2 {
      grid-column: 2;
      grid-row: 1;
    }

    #t3 {
      grid-column: 3;
      grid-row: 1;
    }


    #floatLogContainer {
      position: absolute;
      bottom: 22%;
      right: 12px;
      width: 240px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      pointer-events: none;
      z-index: 20;
    }

    .float-log-item {
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(2px);
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 4px;
      font-size: 12px;
      color: #fff;
      animation: fadeOut 3.5s forwards;
      text-align: right;
    }

    @keyframes fadeOut {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }

      10% {
        opacity: 1;
        transform: translateY(0);
      }

      80% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    #waveProgressBar {
      width: 100%;
      height: 28px;
      background: #0a0c14;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      color: #ffda00;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 2px;
      z-index: 50;
      border-bottom: 2px solid rgba(255, 0, 0, 0.3);
      text-shadow: 0 0 10px currentColor;
    }

    .urgent-timer {
      animation: pulseAlert 0.8s infinite;
      color: #ff3333 !important;
    }

    @keyframes pulseAlert {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }

      100% {
        opacity: 1;
      }
    }

    #waveProgressFill {
      display: none;
    }

    #toast {
      position: absolute;
      left: 50%;
      bottom: 28%;
      transform: translateX(-50%);
      max-width: 92%;
      padding: 8px 16px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s ease;
      display: none;
    }

    #toast.show {
      display: block;
      opacity: 1;
    }

    /* --- 신규 결과 화면 모달 디자인 --- */
    @keyframes slideUpFade {
      0% {
        opacity: 0;
        transform: scale(0.9) translateY(30px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    #resultModal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 12, 20, 0.92);
      backdrop-filter: blur(12px);
      z-index: 9999;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .result-box {
      background: linear-gradient(145deg, #161c33 0%, #0d1120 100%);
      border: 2px solid #3a456e;
      border-radius: 16px;
      padding: 40px 30px;
      width: 320px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), inset 0 2px 10px rgba(255, 255, 255, 0.05);
      animation: slideUpFade 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .result-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 5px;
      text-align: center;
      text-shadow: 0 0 15px currentColor;
    }

    .result-subtitle {
      font-size: 14px;
      color: #8892b0;
      margin-bottom: 25px;
    }

    .rank-badge {
      font-size: 54px;
      font-weight: 900;
      font-style: italic;
      margin-bottom: 20px;
      text-shadow: 0 0 20px currentColor;
    }

    .stat-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 30px;
    }

    .stat-item {
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-item span {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 4px;
    }

    .stat-item b {
      font-size: 16px;
      color: #fff;
    }

    .result-btns {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .result-btns button {
      flex: 1;
      padding: 14px 0;
      font-size: 14px;
      border-radius: 8px;
    }

    /* --- 메인 메뉴 전용 전술 모니터 배경 --- */
    .main-menu-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #05070a;
      /* 전술 그리드(격자)와 방사형 그라데이션 */
      background-image:
        radial-gradient(circle at 50% 50%, rgba(30, 45, 90, 0.4) 0%, rgba(5, 7, 10, 1) 90%),
        linear-gradient(rgba(122, 166, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(122, 166, 255, 0.08) 1px, transparent 1px);
      background-size: 100% 100%, 50px 50px, 50px 50px;
      background-position: center center;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 레이저 스캔라인 애니메이션 */
    .main-menu-bg::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(to bottom, transparent, rgba(122, 166, 255, 0.15) 50%, transparent);
      transform: rotate(30deg);
      animation: scanline 7s linear infinite;
      pointer-events: none;
    }

    @keyframes scanline {
      0% {
        transform: translateY(-100%) rotate(30deg);
      }

      100% {
        transform: translateY(100%) rotate(30deg);
      }
    }

    .main-title {
      color: #fff;
      font-size: 56px;
      font-weight: 900;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 6px;
      text-shadow: 0 0 10px #7aa6ff, 0 0 20px #7aa6ff, 0 0 40px #2a3566;
      z-index: 1;
      text-align: center;
    }

    .main-subtitle {
      color: #8892b0;
      font-size: 14px;
      margin-bottom: 50px;
      letter-spacing: 4px;
      z-index: 1;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="wrap layout">
    <div id="mainMenu" class="main-menu-bg">
      <h1 class="main-title">TOWER<br>DEFENSE</h1>
      <div class="main-subtitle">TACTICAL ENGAGEMENT PROTOCOL</div>

      <div style="display:flex; flex-direction:column; align-items:center; gap:20px; z-index: 1;">
        <button id="btnShowRanking"
          style="width:200px; padding:16px 30px; font-size:16px; font-weight:bold; border-radius:8px; background:rgba(204,153,0,0.8); color:#fff; border:2px solid #ffcc00; box-shadow: 0 0 20px rgba(255,204,0,0.4); backdrop-filter:blur(5px);">
          🏆 RANKING
        </button>
        <button id="btnResume"
          style="width:200px; padding:16px 30px; font-size:16px; font-weight:bold; border-radius:8px; background:rgba(42,53,102,0.8); color:#fff; border:2px solid #7aa6ff; box-shadow: 0 0 20px rgba(122,166,255,0.4); display:none; backdrop-filter:blur(5px);">
          RESUME
        </button>
        <button id="btnNewGame"
          style="width:200px; padding:16px 30px; font-size:16px; font-weight:bold; border-radius:8px; background:rgba(74,31,31,0.8); color:#ffcccc; border:2px solid #ff4d4d; box-shadow: 0 0 20px rgba(255,77,77,0.4); backdrop-filter:blur(5px);">
          NEW START
        </button>
      </div>
    </div>

    <!-- Ranking Modal -->
    <div id="rankingModal"
      style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,12,20,0.95); backdrop-filter:blur(10px); z-index:9500; display:none; flex-direction:column; justify-content:flex-start; align-items:center; padding-top:40px;">
      <h2
        style="color:#ffcc00; font-size:32px; margin-bottom:20px; text-shadow:0 0 15px rgba(255,204,0,0.4); letter-spacing:2px;">
        🏆 HALL OF FAME</h2>
      <div id="rankingList"
        style="width:340px; max-height:60dvh; overflow-y:auto; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:15px; display:flex; flex-direction:column; gap:8px;">
        <div style="text-align:center; color:#888; padding:20px;">랭킹 데이터를 불러오는 중...</div>
      </div>
      <button id="btnCloseRanking"
        style="margin-top:25px; padding:12px 30px; font-size:16px; font-weight:bold; border-radius:8px; background:rgba(42,47,76,0.8); color:#fff; border:1px solid #7aa6ff;">
        닫기
      </button>
    </div>

    <!-- Finisher Modal -->
    <div id="finisherModal"
      style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(15,18,32,0.85); backdrop-filter:blur(10px); z-index:900; display:none; flex-direction:column; justify-content:center; align-items:center; opacity:0; transition: opacity 0.3s ease;">
      <h2 style="color:#ffcc00; font-size:32px; margin-bottom:20px; text-shadow:0 0 15px rgba(255,204,0,0.4);">🔥 필살기 선택
      </h2>
      <div id="finisherCards" style="display:flex; gap:20px;">
        <!-- Card A (HP) -->
        <button id="cardFinisherHP"
          style="width:160px; padding:20px; background:#4a1f1f; border:2px solid #ff4d4d; border-radius:12px; color:#ffcccc; display:flex; flex-direction:column; gap:10px; cursor:pointer; align-items:center; transition: transform 0.2s;">
          <b style="font-size:18px; color:#ff4d4d;">HP 스팀팩</b>
          <div style="font-size:12px; color:#ff9999; text-align:center;">
            타워 공속 1.35x<br>사거리 1.06x<br>(보스전 패널티 70%)
          </div>
          <div style="font-size:14px; color:#ffcc00;">지속: 6.0초</div>
          <div style="font-size:14px; color:#ff4d4d; font-weight:bold;">비용: HP -3</div>
        </button>
        <!-- Card B (Gold) -->
        <button id="cardFinisherGold"
          style="width:160px; padding:20px; background:#4a3f1f; border:2px solid #ffcc00; border-radius:12px; color:#ffeecc; display:flex; flex-direction:column; gap:10px; cursor:pointer; align-items:center; transition: transform 0.2s;">
          <b style="font-size:18px; color:#ffcc00;">골드 부스트</b>
          <div style="font-size:12px; color:#ffdd99; text-align:center;">
            타워 공속 1.20x<br>사거리 보너스 없음
          </div>
          <div style="font-size:14px; color:#ffcc00;">지속: 5.0초</div>
          <div id="textFinisherGoldCost" style="font-size:14px; color:#ffd700; font-weight:bold;">비용: 계산중...</div>
        </button>
      </div>
      <button id="btnCancelFinisher"
        style="margin-top:30px; padding:10px 20px; border-radius:8px; background:#2a2f4c; color:#fff; border:1px solid #4a5568;">취소
        (ESC)</button>
    </div>

    <div id="resultModal">
      <div class="result-box" id="resultBox">
        <div class="result-title" id="resTitle">W100 FAILURE</div>
        <div class="result-subtitle" id="resSub">System Overloaded...</div>
        <div class="rank-badge" id="resRank">C</div>

        <div class="stat-grid">
          <div class="stat-item"><span>🌊 도달 페이즈</span><b id="resWave">100</b></div>
          <div class="stat-item"><span>⭐ 최고 강화</span><b id="resMaxLevel">0</b></div>
          <div class="stat-item"><span>💰 누적 골드</span><b id="resGold" style="color:#ffd700;">0G</b></div>
          <div class="stat-item"><span>🏗️ 건설 타워</span><b id="resTowers">0</b></div>
        </div>

        <input type="text" id="playerName" placeholder="AAA" maxlength="3" autocomplete="off" inputmode="url"
          spellcheck="false" oninput="this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '')"
          style="ime-mode: disabled; width:100%; padding:12px; margin-bottom:20px; background:rgba(0,0,0,0.4); border:1px solid #556; border-radius:8px; color:#fff; font-size:16px; text-align:center; outline:none;" />

        <div class="result-btns">
          <button id="btnResNew" style="background:#2a3566; border-color:#7aa6ff;">NEW START</button>
          <button id="btnResMain" style="background:#2c4a6e; border-color:#7aa6ff; color:#fff;">랭킹 등록</button>
        </div>
      </div>
    </div>

    <div id="chapterModal"
      style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,12,20,0.92); backdrop-filter:blur(10px); z-index:9000; display:none; flex-direction:column; justify-content:center; align-items:center; opacity:0; transition:opacity 0.4s;">
      <h2 style="color:#7aa6ff; font-size:32px; margin-bottom:10px; text-shadow:0 0 20px rgba(122,166,255,0.6);">🚀 방어선
        이동 완료!</h2>
      <div style="color:#8892b0; font-size:14px; margin-bottom:30px; text-align:center;">기존 방어선이 해체되었으며, 투자된 자원이 100%
        환급되었습니다.<br>새로운 지형에 맞춰 타워를 재배치하십시오.</div>
      <div style="display:flex; gap:20px; margin-bottom:40px;">
        <div
          style="background:rgba(0,0,0,0.5); padding:15px 30px; border-radius:12px; border:1px solid rgba(255,215,0,0.3); text-align:center;">
          <div style="font-size:12px; color:#aaa; margin-bottom:5px;">환급 골드</div>
          <div id="chapterGold" style="font-size:24px; color:#ffd700; font-weight:bold;">+0G</div>
        </div>
        <div
          style="background:rgba(0,0,0,0.5); padding:15px 30px; border-radius:12px; border:1px solid rgba(160,122,255,0.3); text-align:center;">
          <div style="font-size:12px; color:#aaa; margin-bottom:5px;">환급 포인트</div>
          <div id="chapterPoints" style="font-size:24px; color:#a07aff; font-weight:bold;">+0P</div>
        </div>
      </div>
      <button id="btnChapterConfirm"
        style="padding:15px 40px; font-size:16px; background:#2a3566; border-color:#7aa6ff; color:#fff; border-radius:8px;">재건설
        시작</button>
    </div>


    <div id="waveProgressBar">
      <div id="waveProgressFill"></div>
    </div>
    <div class="canvas-container" id="canvasContainer">
      <canvas id="c" class="game" width="540" height="816"></canvas>
      <div id="floatLogContainer"></div>
      <div id="toast"></div>
    </div>

    <div class="panel ui">
      <div class="top-bar" id="topStat"><span>준비중...</span></div>

      <!-- 배속 제어 버튼 (절대 위치) -->
      <div style="position:absolute; top:36px; right:8px; z-index:100; display:flex; align-items:center;">
        <button id="btnSpeed"
          style="background:#2a2f4c; border-color:#4a5568; padding:4px 8px; font-size:12px; font-weight:bold; border-radius:4px; margin-right:8px;">
          ⏩ 1x
        </button>
        <button id="btnFinisher"
          style="background:#4a1f1f; border-color:#ff4d4d; color:#ffcccc; padding:4px 8px; font-size:12px; font-weight:bold; border-radius:4px; opacity:0.5; pointer-events:none;">
          🔥 필살기
        </button>
      </div>

      <div class="controls-grid">
        <button id="t1">머신건<span class="desc">빠른 연사</span><span class="cost">50G</span></button>
        <button id="t2">캐논<span class="desc">범위 공격</span><span class="cost">80G</span></button>
        <button id="t3">슬로우<span class="desc">이동 저하</span><span class="cost">70G</span></button>

        <!-- Col 1 (좌하단): 판매, 강화 -->
        <div style="grid-column:1; grid-row:2; display:flex; gap:4px;">
          <button id="sell" style="flex:1;">판매</button>
          <button id="upgrade" style="flex:1;">강화</button>
        </div>

        <!-- Col 2 (중앙하단): 뽑기, 올인 -->
        <div style="grid-column:2; grid-row:2; display:flex; gap:4px;">
          <button id="buyUp"
            style="flex:1; background:#2a1f3d; border-color:#9d4edd; color:#e0c3fc; font-size:11px; line-height:1.2; padding:2px;">
            강화P뽑기<br><span class="cost" style="font-size:9px; opacity:0.8; margin-top:0;">40G</span>
          </button>
          <button id="buyAll"
            style="flex:1; background:#4a1f1f; border-color:#ff4d4d; color:#ffcccc; font-size:11px; line-height:1.2; padding:2px;">
            강화P All-In<br><span style="font-size:9px; opacity:0.8; margin-top:0;">남은 돈 전부 올인</span>
          </button>
        </div>

        <!-- Col 3 (우하단): 신규 영웅 뽑기 -->
        <button id="buyHero"
          style="grid-column:3; grid-row:2; background:#361f36; border-color:#ff3366; color:#ffccdd;">
          영웅 뽑기
          <span class="desc" style="color: #ff99bb;">보스 전용 킬러</span>
          <span class="cost" style="color:#ff6699; opacity:1;">100P</span>
        </button>

        <button id="startWave"><span>▶</span><span>페이즈</span></button>
      </div>
    </div>

      const LOGICAL_W = 540;
      const LOGICAL_H = 816;
      const ASPECT = LOGICAL_W / LOGICAL_H;

      const gridSize = 48;
      const gridCols = Math.floor(LOGICAL_W / gridSize);

      function resizeCanvas() {
        const availW = container.clientWidth;
        const availH = container.clientHeight;

        let cssW = availW;
        let cssH = availW / ASPECT;

        if (cssH > availH) {
          cssH = availH;
          cssW = cssH * ASPECT;
        }

        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = `${Math.floor(cssW)}px`;
        canvas.style.height = `${Math.floor(cssH)}px`;

        canvas.width = Math.floor(cssW * dpr);
        canvas.height = Math.floor(cssH * dpr);

        ctx.scale(dpr * (cssW / LOGICAL_W), dpr * (cssH / LOGICAL_H));
      }
      window.addEventListener('resize', resizeCanvas);
      setTimeout(resizeCanvas, 0);

        const rect = canvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return { x: 0, y: 0 };

        let cx = evt.clientX;
        let cy = evt.clientY;

        if (evt.touches && evt.touches.length > 0) {
          cx = evt.touches[0].clientX;
          cy = evt.touches[0].clientY;
        } else if (evt.changedTouches && evt.changedTouches.length > 0) {
          cx = evt.changedTouches[0].clientX;
          cy = evt.changedTouches[0].clientY;
        }

        const x = (cx - rect.left) / rect.width * LOGICAL_W;
        const y = (cy - rect.top) / rect.height * LOGICAL_H;
        return { x, y };
      }

      // Gacha Logic

      // 신규 추가: All-in 트랜잭션 함수
      function buyUpgradeAllIn() {
        const cost = getGachaCost();
        if (G.gold < cost) {
          log(`💸 골드가 부족합니다 (${cost}G)`);
          return;
        }

        const count = Math.floor(G.gold / cost);
        let totalEarned = 0;
        let usedGold = count * cost;
        let failStreak = 0; // [신규] 연속 실패 카운터 파이프라인

        G.gold -= usedGold;

        // 구매 횟수만큼 확률 연산 일괄 처리
        for (let i = 0; i < count; i++) {
          const r = Math.random();
          if (r < 0.30) {
            failStreak++;
            // [신규] 3연속 꽝 발생 시, 시스템 강제 개입 (천장 시스템)
            if (failStreak >= 3) {
              totalEarned += 1;
              failStreak = 0; // 카운터 초기화
            }
          } else {
            failStreak = 0; // 성공 시 카운터 초기화
            if (r < 0.80) {
              totalEarned += 1;
            } else if (r < 0.92) {
              totalEarned += 2;
            } else {
              totalEarned += Math.floor(Math.random() * 8) + 3;
            }
          }
        }

        if (totalEarned > 0) {
          G.upgradePoints += totalEarned;
          addFloatText(`Total +${totalEarned}P`, LOGICAL_W / 2, LOGICAL_H / 2);
          log(`🔥 올인! ${count}회 뽑기: 총 ${totalEarned}P 획득!`);
        } else {
          addFloatText(`전부 꽝...`, LOGICAL_W / 2, LOGICAL_H / 2);
          log(`😭 올인! ${count}회 뽑기: 전부 꽝입니다...`);
        }
        saveGameState(); log('💾 확률 변동으로 인해 강제 저장됨.');
        updateUI();
      }



      function makeWavePlan(w) {
        const baseHpMul = 1.0 + ((w - 1) * 0.40);
        const plan = [];

        // 0s ~ 60s (Basic Swarm)
        let t = 0.5;
        // The gap between spawns should dynamically decrease from 1.0s to 0.25s as `at` approaches 60s.
        while (t < 60) {
          const types = ['normal', 'fast', 'swarm'];
          const type = types[Math.floor(Math.random() * types.length)];
          plan.push({ at: t, type: type, hpMul: baseHpMul, rewardMul: 1 });

          let gap = 0.5 - (t / 60) * 0.35;
          t += gap;
        }

        // 60s (Elite Squad)
        const eliteCount = 5 + Math.floor(Math.random() * 4); // 5~8
        for (let i = 0; i < eliteCount; i++) {
          const types = ['tank', 'jammer'];
          const type = types[Math.floor(Math.random() * types.length)];
          plan.push({ at: 60.0, type: type, isMiniBoss: true, hpMul: baseHpMul, rewardMul: 3 });
        }

        // 75s (Boss Encounter)
        plan.push({ at: 75.0, type: 'boss', bossType: w * 10, hpMul: baseHpMul * 8, isBoss: true, rewardMul: 1 });

        plan.sort((a, b) => a.at - b.at);
        return plan;
      }

      // Supports override for W10 Split
      let spawnCounter = 0;
      function spawnEnemy(entry, ovX, ovY, ovIdx, ovTier) {
        const base = ENEMY_TYPES[entry.type];

        const tier = ovTier ?? (entry.isBoss ? 1 : Math.min(3, Math.floor((G.wave - 1) / 30) + 1));

        const reward = Math.floor(base.reward * (entry.rewardMul || 1));

        const isBoss = entry.isBoss || false;
        const pathId = isBoss ? 0 : (spawnCounter % MAP_CONFIG.paths.length);
        if (!isBoss) spawnCounter++;
        const targetPath = MAP_CONFIG.paths[pathId];

        const e = {
          type: entry.type,
          x: ovX ?? targetPath[0].x,
          y: ovY ?? targetPath[0].y,
          pathIndex: ovIdx ?? 0,
          pathId: pathId,
          hpMax: base.hp * entry.hpMul,
          hp: base.hp * entry.hpMul,
          speed: base.speed,
          reward: reward * (isBoss ? 7 : 1),
          slowUntil: 0, slowFactor: 0,
          color: base.color, alive: true,
          isBoss: isBoss,
          isTutorial: entry.isTutorial || false,
          isMiniBoss: entry.isMiniBoss || false,
          bossType: entry.bossType || 0,
          radius: isBoss ? 16.5 : (entry.isMiniBoss ? 13 : 11),
          tier: tier,
          canSplit: true, // For T3 Normal Split check
          prevX: ovX ?? targetPath[0].x, // For Flipping
          hitTime: -1, // For Hit Flash
          slowResistance: 0, // Boss Slow Resistance

          // Synergy State
          frozenUntil: 0,
          poisonUntil: 0, poisonDps: 0,
          synergyFreezeCdUntil: 0,

          lastSlowedAt: 0,

          // T1 Stacking State
          mgStacks: 0,
          mgStackUntil: 0,
          vulnUntil: 0,
          vulnCdUntil: 0
        };

        if (e.isBoss) BossHandler.init(e, G.wave);

        if (e.isMiniBoss) e.speed *= 1.10;

        // Monster Evolution System
        if (G.wave > 10 && G.wave <= 50) {
          // W11-50: Color Evolution
          const hue = (240 + (G.wave - 11) * 5) % 360;

        } else if (G.wave > 50) {
          // W51+: Mutation (Spiked Shapes)
          e.isMutant = true;
          e.mutantColor = `hsla(${(G.wave * 10) % 360}, 100%, 50%, 1)`;
          // Randomize shape sides: 3 (Tri) to 8 (Oct)

      function handleInput(pos) {
        if (G.endingActive) {
          handleEndingClick(pos);
          return;
        }
        if (G.gameState !== 'PLAYING') return;
        const gx = Math.floor((pos.x - offsetX) / gridSize);
        const gy = Math.floor((pos.y - offsetY) / gridSize);

        if (gx < 0 || gx >= gridCols || gy < 0 || gy >= gridRows) {
          G.previewTower = null; return;
        }

        const t = G.towers.find(t => t.gx === gx && t.gy === gy);

        if (G.mode === 'place' || G.mode === 'placeHero') {
          if (t) { log('🚫 이미 타워가 있습니다.'); G.previewTower = null; return; }

          const targetType = G.mode === 'placeHero' ? 1 : G.selectedTowerType;

          if (G.previewTower && G.previewTower.gx === gx && G.previewTower.gy === gy && G.previewTower.type === targetType && Boolean(G.previewTower.isHero) === (G.mode === 'placeHero')) {
            if (G.mode === 'placeHero') {
              placeHeroTower(gx, gy);
              G.previewTower = null;
              setMode('place', 1);
            } else {
              placeTower(gx, gy, G.selectedTowerType);
              G.previewTower = null;
            }
          } else {
            G.previewTower = { gx, gy, type: targetType, isHero: G.mode === 'placeHero', pendingHero: G.pendingHero };
          }
        } else if (G.mode === 'sell' && t) {
          if (!G.isTutorialDone || G.wave === 0) { log('🚫 튜토리얼 훈련 중에는 타워를 판매할 수 없습니다.'); G.previewTower = null; return; }
          const v = getSellValue(t); G.gold += v;
          G.towers = G.towers.filter(x => x !== t);
          G.sellCount++; // Analytics hook
          log(`💰 판매 완료 (+${v}G)`); addFloatText(`+${v}`, t.x, t.y);
          saveGameState();
          G.previewTower = null;
        } else if (G.mode === 'upgrade' && t) {

          const c = getUpgradeCost(t); // returns t.level
          if (G.upgradePoints >= c) {
            G.upgradePoints -= c;
            applyUpgrade(t);
            log(`⚡ 강화 성공 (Lv.${t.level})`); addFloatText('UP!', t.x, t.y - 10);
            saveGameState();
          } else { log(`💎 강화 포인트 부족 (${c}P 필요)`); }
          G.previewTower = null;
        } else {
          G.previewTower = null;
        }
        updateUI();
      }

      function placeTower(gx, gy, type) {

        // 데이터 제약 조건: 상단 2칸(소굴)은 건설 불가 판정
        if (gy < MAP_CONFIG.restrictedTopRows) {
          log("🚫 적의 소굴에는 타워를 건설할 수 없습니다!");
          addFloatText("Access Denied", offsetX + gx * gridSize + 24, offsetY + gy * gridSize + 24);
          return;
        }

        const def = TOWER_TYPES[type];
        if (G.gold < def.cost) { log(`💸 골드가 부족합니다 (${def.cost}G)`); return; }

        const px = gx * gridSize + gridSize / 2 + offsetX;
        const py = gy * gridSize + gridSize / 2 + offsetY;

        if (lockedGrids.has(`${gx},${gy}`)) { log('🚫 이동 경로 위에는 건설할 수 없습니다.'); return; }

        G.gold -= def.cost;
        updateUI();
        G.towers.push({
          gx, gy, type, level: 1,
          x: px, y: py,
          range: def.range, damage: def.damage,
          fireRate: def.fireRate, aoe: def.aoe, slow: def.slow,
          cooldown: 0,
          lastAngle: 0 // State Persistence
        });
        G.buildCount++; // Analytics hook
        log(`🔨 ${def.name} 건설 (-${def.cost}G)`);
        addFloatText(`-${def.cost}`, px, py - 10);
        saveGameState();
        updateUI();
      }

      function placeHeroTower(gx, gy) {
        const def = TOWER_TYPES[1]; // T1 베이스
        const px = gx * gridSize + gridSize / 2 + offsetX;
        const py = gy * gridSize + gridSize / 2 + offsetY;

        if (lockedGrids.has(`${gx},${gy}`)) { log('🚫 이동 경로 위에는 건설할 수 없습니다.'); return; }

        const h = G.pendingHero;
        G.isTutorialDone = true;
        updateUI();

        // --- [신규 주입] 영웅 등급별 동적 스케일링(Dynamic Scaling) 아키텍처 ---
        const baseLevels = G.towers.filter(t => !t.isHero).map(t => t.level).sort((a, b) => b - a);
        const top1 = baseLevels[0] || 1;

        // 1) Compute coreAvg (Top 50% truncated mean, clamped 3..6)
        const n = baseLevels.length;
        const coreCount = Math.min(6, Math.max(3, Math.ceil(n * 0.5)));
        const core = baseLevels.slice(0, coreCount);
        const coreAvg = core.length ? Math.floor(core.reduce((s, v) => s + v, 0) / core.length) : 1;

        // 2) Top 3 Avg
        const top3avg = baseLevels.length >= 3
          ? Math.floor((baseLevels[0] + baseLevels[1] + baseLevels[2]) / 3)
          : (baseLevels.length > 0 ? Math.floor(baseLevels.reduce((s, v) => s + v, 0) / baseLevels.length) : 1);

        let targetLevel = 1;

        if (h.grade === 'A') {
          // A급: 현재 맵에 존재하는 비-영웅 타워 중 상위 5개의 평균 레벨 (이동평균 추종)
          const top5 = baseLevels.slice(0, 5);
          if (top5.length > 0) {
            const sum = top5.reduce((val, acc) => val + acc, 0);
            targetLevel = Math.max(1, Math.floor(sum / top5.length));
          }
        } else if (h.grade === 'S') {
          if (baseLevels.length > 0) {
            const baseS = Math.max(top3avg + HERO_S_ADD, coreAvg + 1);
            targetLevel = Math.min(baseS, Math.max(1, G.wave + HERO_S_MAX_OFFSET));
          }
        } else if (h.grade === 'SS') {
          if (baseLevels.length > 0) {
            const baseSS = Math.max(top1 + HERO_SS_ADD, coreAvg + 2);
            targetLevel = Math.min(baseSS, Math.max(1, G.wave + HERO_SS_MAX_OFFSET));
          }
        }

        // --- 레벨 기반 복리(Compound) 스탯 재연산 ---
        // --- 레벨 기반 선형 스탯 연산 ---
        const levelMod = targetLevel - 1;
        const scaledDamage = (def.damage * 5) * (1 + levelMod * 0.25);
        let scaledRange = def.range; // Locked
        const scaledFireRate = def.fireRate * (1 + levelMod * 0.05);

        let aAuraRadius = 250;
        if (h.grade === 'SS') {
          scaledRange *= 1.15;
        } else if (h.grade === 'S') {
          scaledRange *= 1.05;
        } else if (h.grade === 'A') {
          aAuraRadius = Math.min(Math.max(250 + levelMod * 1.2, 250), 320);
        }

        scaledRange = Math.min(scaledRange, 220);

        G.towers.push({
          gx, gy, type: 1, level: targetLevel,
          x: px, y: py,
          range: scaledRange,
          damage: scaledDamage,
          fireRate: scaledFireRate,
          aoe: def.aoe,
          slow: def.slow,
          cooldown: 0,
          lastAngle: 0,
          isHero: true,
          heroGrade: h.grade,
          remainWaves: h.remainWaves,
          globalBurnTimer: 0, // S등급 전용
          ssTrueDmgCdUntil: 0, // SS등급 전용
          aAuraRadius // A등급 전용
        });

        // [수정 완료] 등급별 메시지 및 특성 분기 파이프라인
        let heroName = "";
        let heroAbility = "";

        if (h.grade === 'SS') {
          heroName = "🔴 [SS급: 보스 슬레이어]";
          heroAbility = "보스 타격 시 주기적으로 '고정 피해(상한)'를 추가합니다.";
        } else if (h.grade === 'S') {
          heroName = "🟡 [S급: 이그니스 엠버]";
          heroAbility = "0.5초마다 전역 화염 데미지. (보스는 약화 적용)";
        } else {
          heroName = "🟢 [A급: 프로스트 가디언]";
          heroAbility = `반경 ${Math.floor(aAuraRadius)}px 내의 모든 적을 50% 감속시킵니다.`;
        }

        // 통합 로그 출력 및 UI 업데이트
        log(`${heroName} 강림! (Lv.${targetLevel} / 수명: ${h.remainWaves}W)`);
        log(`ㄴ 특성: ${heroAbility}`);

        addFloatText(`🚀 ${h.grade} GRADE HERO!`, px, py - 10);

        G.pendingHero = null;
        saveGameState();
        updateUI();
      }

      function buyHeroPoint() {
        const cost = 100;
        if (G.upgradePoints < cost) { log(`💎 강화P가 부족합니다 (${cost}P)`); return; }

        G.upgradePoints -= cost;

      // ====== 5. 비즈니스 로직 및 상태 관리 상단에 추가 ======
      let last = performance.now(); // [교정] last 초기값 선언
      let waveStartTime = 0;        // [교정] waveStartTime 선언


      // --- ENDING SYSTEM (HTML UI 연동) ---
      function triggerEnding(type) {
        G.gameState = 'GAMEOVER';

        const box = document.getElementById('resultBox');
        const title = document.getElementById('resTitle');
        const sub = document.getElementById('resSub');
        const rank = document.getElementById('resRank');

        // 데이터 바인딩
        const maxLevel = G.towers.length > 0 ? Math.max(...G.towers.map(t => t.level)) : 0;
        document.getElementById('resWave').innerText = G.wave;
        document.getElementById('resMaxLevel').innerText = maxLevel;
        document.getElementById('resGold').innerText = Math.floor(G.totalGoldEarned || 0) + 'G';
        document.getElementById('resTowers').innerText = tCount;

        // 랭크 계산
        let grade = 'F';
        let gradeColor = '#555';
        if (type === 'WIN') {
          grade = G.lives >= 20 ? 'S' : (G.lives >= 10 ? 'A' : 'B');
          gradeColor = grade === 'S' ? '#ffcc00' : '#7aa6ff';
        } else {
          if (G.wave >= 80) grade = 'A';
          else if (G.wave >= 50) grade = 'B';
          else if (G.wave >= 20) grade = 'C';
          gradeColor = '#ff4d4d';
        }

        rank.innerText = grade;
        rank.style.color = gradeColor;

        if (type === 'WIN') {
          title.innerText = "MISSION CLEAR!";
          title.style.color = "#7aa6ff";
          sub.innerText = "완벽한 방어선입니다, 사령관님.";
          box.style.borderColor = "#7aa6ff";
          box.style.boxShadow = "0 15px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(122,166,255,0.2)";
        } else {
          title.innerText = `P${G.wave} FAILURE`;
          title.style.color = "#ff4d4d";
          sub.innerText = "방어선이 돌파당했습니다...";
          box.style.borderColor = "#ff4d4d";
          box.style.boxShadow = "0 15px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,77,77,0.2)";
        }

        modal.style.display = 'flex';
      }

      // 결과 창 버튼 이벤트 리스너 (Firebase API 연동용 래핑)
      async function extractAndSaveScore() {
        if (!window.defenseRankingAPI) {
          alert("📡 서버 통신 모듈을 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
          throw new Error("Firebase API Not Loaded"); // 에러를 던져서 세이브 삭제 방지
        }
        let nameInput = document.getElementById('playerName').value.trim();
        if (!nameInput) nameInput = "AAA";
        const rankB = document.getElementById('resRank').innerText;

        // saveScore 내부에서 발생하는 에러도 캐치할 수 있도록 await 유지
        await window.defenseRankingAPI.saveScore(nameInput, G.wave, G.totalGoldEarned || 0, rankB);
      }

      document.getElementById('btnResNew').onclick = async () => {
        document.getElementById('resultModal').style.display = 'none';
        await extractAndSaveScore();
        localStorage.removeItem('defenseSave');
        G.gameState = 'PLAYING';
        resetGame();
        G.isTutorialDone = false;
        updateUI();
      };

      // PC/모바일 터치 씹힘 방지 및 완벽한 순서 보장
      const handleRankingSubmit = async (e) => {
        if (e && e.cancelable) e.preventDefault();

        // 키보드 내리기 딜레이 최소화를 위해 비동기 처리 직전에 배치하되, 
        // UI 스레드 차단을 막기 위해 setTimeout 활용
        setTimeout(() => document.getElementById('playerName').blur(), 0);

        const btn = document.getElementById('btnResMain');
        if (btn.disabled) return;
        btn.disabled = true;
        btn.innerText = "전송 중...";

        try {
          // 1. 서버 전송 시도
          await extractAndSaveScore();

          // 2. 서버 전송이 '완벽히 성공'했을 때만 데이터 초기화 (원자성 보장)
          document.getElementById('resultModal').style.display = 'none';
          localStorage.removeItem('defenseSave');

          G.gameState = 'MENU';
          resetGame();
          G.isTutorialDone = false;
          updateUI();
          document.getElementById('mainMenu').style.display = 'flex';

          document.getElementById('rankingModal').style.display = 'flex';
          document.getElementById('rankingList').innerHTML = '<div style="text-align:center; color:#888; padding:20px;">기록을 갱신하는 중...</div>';

          await new Promise(resolve => setTimeout(resolve, 800));
          if (window.defenseRankingAPI) window.defenseRankingAPI.loadRankings();

        } catch (error) {
          // 전송 실패 시 로컬 세이브를 지우지 않고 유저가 다시 시도할 수 있도록 롤백
          console.error("랭킹 등록 트랜잭션 실패:", error);
          // 버튼 상태만 원상복구
        } finally {
          btn.disabled = false;
          btn.innerText = "랭킹 등록";
        }
      };

      const btnResMain = document.getElementById('btnResMain');
      btnResMain.onclick = handleRankingSubmit;
      btnResMain.ontouchend = handleRankingSubmit;

      function triggerChapterReset() {
        let refundGold = 0;
        let refundPoints = 0;
        G.towers.forEach(t => {
          if (t.isHero) return; // Do not refund heroes
          const baseCost = TOWER_TYPES[t.type].cost;
          refundGold += baseCost;
          // cumulative sum from 1 to level-1
          refundPoints += (t.level * (t.level - 1)) / 2;
        });

        // Wipe only normal towers
        G.towers = G.towers.filter(t => t.isHero);

        // --- NEW: Swap Map for the Next Chapter ---
        const chIdx = (G.wave - 1) % CHAPTER_MAPS.length;
        if (CHAPTER_MAPS[chIdx]) {
          MAP_CONFIG.paths = CHAPTER_MAPS[chIdx].paths;
          MAP_CONFIG.decorations = CHAPTER_MAPS[chIdx].decorations;
          updateMapCache();
          log(`🗺️ [챕터 ${chIdx + 1}] 새로운 방어선 지형으로 갱신되었습니다.`);
        }
        // ------------------------------------------

        G.gold += refundGold;
        G.upgradePoints += refundPoints;

        document.getElementById('btnChapterConfirm').style.display = 'none';
        const modal = document.getElementById('chapterModal');
        document.getElementById('chapterGold').innerText = `+${refundGold}G`;
        document.getElementById('chapterPoints').innerText = `+${refundPoints}P`;
        modal.style.display = 'flex';
        setTimeout(() => { modal.style.opacity = 1; }, 10);
        setTimeout(() => {
          modal.style.opacity = 0;
          setTimeout(() => { modal.style.display = 'none'; }, 400);
        }, 2500);

        updateUI();
      }

      document.getElementById('btnChapterConfirm').onclick = () => {
        const modal = document.getElementById('chapterModal');
        modal.style.opacity = 0;
        setTimeout(() => { modal.style.display = 'none'; }, 400);
      };

      function tick(now) {
        const realDt = Math.min(0.05, (now - last) / 1000);
        last = now;

        // [신규 주입] G.gameSpeed만큼 서브-스테핑 루프 실행
        if (G.gameState === 'PLAYING') {
          // Ending Phase 1 Timer logic (runs even if gameplay is frozen)
          if (G.endingActive) {
            G.endingTimer += realDt;
            if (G.endingPhase === 1 && G.endingTimer >= 1.2) {
              G.endingPhase = 2;
              G.endingTimer = 0;
            }
          }

          if (G.endingActive) {
            // Freeze gameplay entirely, skip tracking loop mechanics
            render();
            requestAnimationFrame(tick);
            return;
          }

          for (let step = 0; step < G.gameSpeed; step++) {
            let endingJustTriggered = false;
            const dt = realDt; // 서브 스텝별 동일한 dt 적용
            G.time += dt;

            // Reset Global Debuff Every Frame (Sub-step)
            G.globalRangeDebuff = false;

            if (G.inWave && G.spawnPlan) {
              const elapsed = G.time - waveStartTime;
              while (G.spawnCursor < G.spawnPlan.length && G.spawnPlan[G.spawnCursor].at <= elapsed) {
                spawnEnemy(G.spawnPlan[G.spawnCursor]); G.spawnCursor++;
              }
              if (G.spawnCursor >= G.spawnPlan.length && G.enemies.every(e => !e.alive)) {
                G.inWave = false;
                G.isResting = true; G.restTimer = 30.0;

                // Prevent buff leakage outside combat
                G.overclockActive = false;
                G.overclockUntil = 0;

                // Finisher Wave Clear Reset
                G.finisherActive = false;
                G.finisherUntil = 0;
                G.finisherType = null;
                G.finisherFRMult = 1;
                G.finisherRangeMult = 1;
                G.finisherKillGoldMult = 1;

                const bonus = 40 + G.wave * 10;
                G.gold += bonus;
                G.totalGoldEarned += bonus; // NEW
                log(`🎉 웨이브 클리어! (+${bonus}G)`);

                // --- Rental Hero Lifecycle ---
                G.towers = G.towers.filter(t => {
                  if (t.isHero) {
                    t.remainWaves--;
                    if (t.remainWaves <= 0) {
                      log(`👋 ${t.heroGrade}등급 영웅 타워가 떠납니다...`);
                      return false;
                    }
                  }
                  return true;
                });

                if (G.wave > 0) {
                  triggerChapterReset();
                }

                saveGameState();
                updateUI();
              }
            }

            // Auto Overclock Logic Check
            if (G.inWave && G.wave >= OVERCLOCK_WAVES[0] && G.wave <= OVERCLOCK_WAVES[1] && !(G.wave === 0 && !G.isTutorialDone)) {
              if (!G.overclockUsedThisWave && G.time >= G.overclockCooldownUntil && G.totalSpawnCount > 0) {
                const progress = G.currentFinishedCount / G.totalSpawnCount;
                if (progress >= OVERCLOCK_TRIGGER_PROGRESS) {
                  G.overclockActive = true;
                  G.overclockUntil = G.time + OVERCLOCK_DURATION;
                  G.overclockUsedThisWave = true;
                  G.overclockCooldownUntil = G.time + OVERCLOCK_INTERNAL_CD;
                  log("⚡ OVERCLOCK!");
                  addFloatText("⚡ OVERCLOCK!", LOGICAL_W / 2, LOGICAL_H / 2 - 50);
                }
              }
            }

            // Auto Overclock Expiration Check
            if (G.overclockActive && G.time >= G.overclockUntil) {
              G.overclockActive = false;
            }

            // Finisher Expiration Check
            if (G.finisherActive && G.time >= G.finisherUntil) {
              G.finisherActive = false;
              G.finisherType = null;
              G.finisherFRMult = 1;
              G.finisherRangeMult = 1;
              G.finisherKillGoldMult = 1;
              updateUI();
            }

            // 1. 루프 시작 직전에 '이번 프레임에 운석이 공격받았는가?'를 체크하는 변수 선언
            let isRockPushed = false;


            for (const e of G.enemies) {
              if (!e.alive) continue;
              e.prevX = e.x;

              if (e.dashCooldown > 0) e.dashCooldown -= dt;

              BossHandler.applyTick(e, dt, G);

              // --- NEW: Jammer EMP Skill ---
              if (e.type === 'jammer' && e.alive && e.frozenUntil <= G.time) {
                e.skillTimer = (e.skillTimer || 0) + dt;
                if (e.skillTimer >= 4.0) {
                  e.skillTimer = 0;
                  const activeTowers = G.towers.filter(t => (t.stunUntil || 0) <= G.time);
                  if (activeTowers.length > 0) {
                    const targetTower = activeTowers[Math.floor(Math.random() * activeTowers.length)];

                    // Dynamic Stun Duration based on Wave
                    let stunDuration = 3.0;
                    if (G.wave >= 81) stunDuration = 1.0;
                    else if (G.wave >= 61) stunDuration = 2.0;

                    targetTower.stunUntil = G.time + stunDuration;
                    G.projectiles.push({ x1: e.x, y1: e.y, x2: targetTower.x, y2: targetTower.y, life: 0.3, type: 'emp', aoe: 0 });
                    addFloatText("⚡ EMP!", targetTower.x, targetTower.y - 20);
                  }
                }
              }

              if (e.poisonUntil > G.time) {
                e.hp -= (e.poisonDps * dt);
                if (e.hp <= 0 && e.alive) {
                  e.hp = 0; // Will be cleanly caught and processed by the existing death logic elsewhere or right here.
                  // Safely trigger standard death logic:
                  e.alive = false;
                  if (!e.isBoss || e.bossType !== 10) G.currentFinishedCount++;
                  BossHandler.onDeath(e, G);
                  addRewardGold(e);
                  updateUI();
                  continue; // Skip further movement processing this frame
                }
              }

              // 👇 [수정된 감속 로직] 슬로우가 풀리면 계수도 확실하게 리셋!
              let effectiveSlow = 0;
              if (e.slowUntil > G.time) {
                effectiveSlow = e.slowFactor;
              } else {
                e.slowFactor = 0; // 상태 이상 종료 시 감속 비율 초기화
              }

              if (e.isBoss) effectiveSlow *= 0.5;

              const speed = (e.currentSpeed || e.speed) * (1 - effectiveSlow);
              const finalSpeed = e.isBoss ? Math.max(speed, (e.currentSpeed || e.speed) * 0.4) : speed;

              // Synergy: Freeze Block (Do not advance movement if frozen)
              if (e.frozenUntil > G.time) {
                continue; // Skip movement processing this sub-step
              }

              const currentPath = MAP_CONFIG.paths[e.pathId || 0];

              if (e.dashReq || e.evadeDashReq) {
                const nextIdx = Math.min(e.pathIndex + 1, currentPath.length - 1);
                const nextParam = currentPath[nextIdx];
                const angle = Math.atan2(nextParam.y - e.y, nextParam.x - e.x);

                const distToNext = dist({ x: e.x, y: e.y }, nextParam);
                const dashDist = Math.min(50, distToNext);

                e.x += Math.cos(angle) * dashDist;
                e.y += Math.sin(angle) * dashDist;

                if (e.evadeDashReq) {
                  e.evadeDashReq = false;
                } else {
                  e.dashReq = false;
                  addFloatText("Dash!", e.x, e.y);
                }
              }

              let move = finalSpeed * dt;
              if (finalSpeed > 0 && move < 0.2) move = 0.2;

              while (move > 0 && e.pathIndex < currentPath.length - 1) {
                const next = currentPath[e.pathIndex + 1];
                const distToNext = dist({ x: e.x, y: e.y }, next);

                if (distToNext <= move + 0.5) {
                  e.x = next.x;
                  e.y = next.y;
                  e.pathIndex++;
                  move -= distToNext;
                } else {
                  const dx = (next.x - e.x) / distToNext;
                  const dy = (next.y - e.y) / distToNext;
                  e.x += dx * move;
                  e.y += dy * move;
                  move = 0;
                }
              }

              // 👇 [신규 추가] 🌑 운석(바위) 물리 충돌 및 강제 정체 로직
              if (G.rock && G.rock.available && !e.isTutorial) {
                // 적이 운석 방어선(y: 790)을 넘으려 하면 발동!
                if (e.y >= 790 && e.pathIndex >= currentPath.length - 2) {
                  if (!G.rock.active) {
                    G.rock.active = true;
                    G.rock.timer = G.rock.duration; // 5초 타이머 시작
                    log("🌑 최후의 방어선 작동! 10초간 적을 차단합니다!");
                  }

                  // 운석이 활성화되어 있는 10초 동안은 위치 전송을 강제로 고정
                  if (G.rock.timer > 0) {
                    e.y = 790; // 이 선을 넘지 못함
                    e.x = 270; // 중앙 길목으로 모임
                    e.pathIndex = currentPath.length - 2; // 다음 인덱스로 넘어가는 것을 차단

                    // 핵심: 적이 운석을 들이받고 있다면 푸시 상태를 true로 변경!
                    isRockPushed = true;
                  }
                }
              }


              if (e.pathIndex >= currentPath.length - 1) {
                // [신규 주입] 허수아비를 놓쳐도 페널티 없이 튜토리얼 강제 졸업
                if (e.isTutorial) {
                  G.isTutorialDone = true;
                  G.gold += 200; G.totalGoldEarned += 200; // NEW
                  G.wave = 0;
                  e.alive = false;
                  log('🎉 튜토리얼 완료! [▶ 웨이브]를 눌러 본격적인 방어를 시작하세요.');
                  updateUI();
                  if (typeof saveGameState === 'function') saveGameState();
                  continue;
                }

                // 👇 [신규 추가] 5초 방어 바위 로직
                if (G.rock && G.rock.available) {
                  if (!G.rock.active) {
                    G.rock.active = true;
                    G.rock.timer = G.rock.duration; // 5초 타이머 시작
                    log("🪨 최후의 방어선! 바위가 적을 5초간 막아냅니다!");
                    addFloatText("🪨 BLOCK!", e.x, e.y - 30);
                  }
                }

                // 바위가 발동 중이면 데미지를 입지 않고 길 끝에서 대기(정체)함
                if (G.rock && G.rock.active && G.rock.timer > 0) {
                  e.x = currentPath[currentPath.length - 1].x;
                  e.y = currentPath[currentPath.length - 1].y;
                  continue; // 아래에 있는 라이프 감소 로직을 무시하고 넘김!
                }

                e.alive = false;
                const damageToLife = e.isBoss ? 5 : 1;
                G.lives -= damageToLife;

                if (e.isBoss) {
                  log(`🚨 경고: 보스가 돌파했습니다! HP -${damageToLife}`);
                  addFloatText(`HP -${damageToLife}`, e.x, e.y);
                } else {
                  log(`💥 몬스터 통과!`);
                }

                updateUI();
                if (G.lives <= 0 || (e.isBoss && e.bossType === 100)) {
                  if (G.lives <= 0 || (G.wave === 100 && !G.endingActive)) {
                    G.lives = 0;
                    updateUI();
                    G.deathPos = { x: Math.floor(e.x), y: Math.floor(e.y) };
                    G.deathReason = e.isBoss ? "Boss Break" : "Monster Break";
                    triggerEnding('FAIL');
                    endingJustTriggered = true;
                    G.inWave = false;
                    G.spawnPlan = null;
                    break;
                  }
                }
              }

              // 3. 루프 종료 직후, 푸시 상태일 때만 내구도(타이머) 감소!
              if (G.rock && G.rock.active && isRockPushed) {
                G.rock.timer -= dt; // 적이 밀고 있을 때만 시간이 깎임
                if (G.rock.timer <= 0) {
                  G.rock.available = false;
                  G.rock.active = false;
                  log("💥 최후의 방어선이 산산조각 났습니다!");

                  // --- NEW: 운석 폭발 최후의 저항 ---
                  G.enemies.forEach(enemy => {
                    // 반경 120px 내의 적 처치 (x: 270, y: 790 기준)
                    if (enemy.alive && Math.hypot(enemy.x - 270, enemy.y - 790) < 120 && !enemy.isStealth) {
                      enemy.hp = 0;
                      enemy.alive = false;
                      addFloatText("⚠CRUSH⚠", enemy.x, enemy.y - 15);
                      BossHandler.onDeath(enemy, G);
                      addRewardGold(enemy); // 폭발로 죽은 적의 골드 정상 지급!
                    }
                  });
                  updateUI();
                }
              }

            }

            if (endingJustTriggered) break;

            for (const t of G.towers) {
              t.stunUntil = t.stunUntil || 0;
              if (G.time < t.stunUntil) continue; // ⚡ Disabled: Skip everything

              t.cooldown -= dt;
              t.targetCheckTimer = (t.targetCheckTimer || 0) - dt; // 타겟칭 쿨타임 처리

              if (t.isHero) {
                if (t.heroGrade === 'A') {
                  const auraRad = t.aAuraRadius || 250;
                  for (const e of G.enemies) {
                    if (e.alive && dist(t, e) <= auraRad) {
                      e.slowUntil = Math.max(e.slowUntil, G.time + 0.1);
                      e.slowFactor = Math.max(e.slowFactor, 0.5);
                    }
                  }
                } else if (t.heroGrade === 'S') {
                  t.globalBurnTimer += dt;
                  if (t.globalBurnTimer >= 0.5) {
                    t.globalBurnTimer -= 0.5;
                    const burnDmg = t.damage * 0.2;
                    for (const e of G.enemies) {
                      if (e.alive) {
                        const actualDmg = e.isBoss ? burnDmg * 0.25 : burnDmg;
                        e.hp -= actualDmg;
                        if (e.hp <= 0 && e.alive) {
                          e.alive = false;
                          if (!e.isBoss || e.bossType !== 10) G.currentFinishedCount++;
                          BossHandler.onDeath(e, G);
                          if (e.isMiniBoss && Math.random() < 0.2) { G.upgradePoints++; addFloatText(`Lucky! +1P`, e.x, e.y - 15); }
                          addRewardGold(e);
                          updateUI();
                        }
                      }
                    }
                  }
                }
              }

              // [신규 주입] 타겟 최적화 (Target Caching & Invalidation 규칙)
              let needsNewTarget = false;

              // W90 Global Range Debuff Check (Active Bosstype 90 or W100 with trait 90)
              const hasW90 = G.enemies.some(e => e.alive && e.isBoss && ((e.bossType === 90) || (e.bossType === 100 && e.activeTrait === 90)));

              // Apply Overclock Range Buff first (Excluding Heroes), then W90 Debuff
              const oc = (G.overclockActive && !t.isHero);
              const finR = (G.finisherActive && !t.isHero) ? G.finisherRangeMult : 1;
              let effectiveRange = t.range * (oc ? OVERCLOCK_RANGE_MULT : 1) * finR;
              if (hasW90) effectiveRange *= 0.8;

              if (!t.target) {
                needsNewTarget = true;
              } else if (!t.target.alive) {
                needsNewTarget = true;
              } else if (dist(t, t.target) > effectiveRange) {
                needsNewTarget = true;
              } else if (t.targetCheckTimer <= 0) {
                needsNewTarget = true;
              }

              if (needsNewTarget) {
                t.target = findTarget(t, effectiveRange);
                t.targetCheckTimer = 0.2; // 0.2초 쿨타임 부여
              }

              // 타겟이 존재하고 발사 가능할 때
              if (t.cooldown <= 0 && t.target) {
                // Update Aim Angle
                t.lastAngle = Math.atan2(t.target.y - t.y, t.target.x - t.x);
                fire(t, t.target);

                // Apply Overclock Fire Rate Buff (Excluding Heroes)
                const oc = (G.overclockActive && !t.isHero);
                const finFR = (G.finisherActive && !t.isHero) ? G.finisherFRMult : 1;
                const effectiveFireRate = t.fireRate * (oc ? OVERCLOCK_FR_MULT : 1) * finFR;
                t.cooldown = 1 / effectiveFireRate;
              } else if (t.cooldown <= 0 && !t.target) {
                t.cooldown = 0.1; // Idle 상태 재탐색 주기 0.1초 
              }

              // Recoil Decay
              t.recoil = Math.max(0, (t.recoil || 0) - dt * 20);
            }

            // if (G.time % 2 < dt) {
            //   G.enemies = G.enemies.filter(e => e.alive);
            //   G.projectiles = G.projectiles.filter(p => p.life > 0);
            //   G.floatTexts = G.floatTexts.filter(f => f.life > 0);
            // }

            // [수정된 아키텍처 적용: 루프 내부 하단]
            // 상태가 종료된 객체는 지연 없이 즉각적으로 메모리에서 해제 (GC 강제화)
            G.enemies = G.enemies.filter(e => e.alive);
            G.projectiles = G.projectiles.filter(p => p.life > 0);
            G.floatTexts = G.floatTexts.filter(f => f.life > 0);

            G.projectiles.forEach(p => p.life -= dt);
            G.floatTexts.forEach(f => { f.life -= dt / G.gameSpeed; f.y -= 25 * dt; });
          } // Sub-stepping loop End

          if (!G.inWave && G.isResting) {
            const prevSec = Math.ceil(G.restTimer);
            G.restTimer -= realDt;
            if (Math.ceil(G.restTimer) !== prevSec) updateUI(); // Update UI smoothly
            if (G.restTimer <= 0) { G.isResting = false; startWave(); }
          }
        }

        render(); // Rendering pipeline은 루프 밖에서 프레임당 1번만 실행
        requestAnimationFrame(tick);
      }

      function findTarget(t, range) {
        let best = null, bestScore = -Infinity;

        for (const e of G.enemies) {
          if (!e.alive || dist(t, e) > range) continue;
          if (e.isStealth) continue; // W50 Stealth Ignored

          const currentPath = MAP_CONFIG.paths[e.pathId || 0];
          const score = e.pathIndex * 10000 - dist(e, currentPath[Math.min(e.pathIndex + 1, currentPath.length - 1)]);
          if (score > bestScore) { bestScore = score; best = e; }
        }
        return best;
      }

      function fire(t, target) {
        const dmg = t.damage;
        t.recoil = 5; // Set Recoil

        if (t.type === 2) {
          // T2 Multi-Missile Volley (5 shots)
          for (let i = 0; i < 5; i++) {
            const spreadX = (Math.random() - 0.5) * 30;
            const spreadY = (Math.random() - 0.5) * 30;
            G.projectiles.push({
              x1: t.x, y1: t.y, x2: target.x + spreadX, y2: target.y + spreadY,
              life: 0.15 + i * 0.05, // Staggered impact
              type: 2, aoe: t.aoe,
              isFinal: i === 4 // Mark final shot for AOE ring
            });
          }
          // AOE Logic is handled per projectile impact or we just apply damage once?
          // Current logic: AOE damage is applied immediately for simplicity, visuals are delayed.
          // To be precise: damage should sync with visuals. But for now, keeping immediate damage for responsiveness.
          G.enemies.forEach(e => {
            if (e.alive && dist(target, e) <= t.aoe) {
              // Synergy Check: "냉각 폭발" 
              // If slowed by T3 and within last 1.6s
              if (G.wave >= SYNERGY_FREEZE_MIN_WAVE && !e.isBoss && e.lastSlowedByType === 3 && (G.time - e.lastSlowedAt <= 1.6)) {
                if (G.time >= e.synergyFreezeCdUntil) {
                  e.frozenUntil = Math.max(e.frozenUntil, G.time + 0.35);
                  e.synergyFreezeCdUntil = G.time + 2.0;
                  G.statsFreezeCount++; // Ending stat tracker

                  // ✨ [신규 추가] 시너지 발동을 알리는 강력한 플로팅 텍스트!
                  addFloatText("❄️", e.x, e.y - 30);

                  // Synergy Tips: Freeze
                  hintFlags.freezeTriggeredOnce = true;
                  if (!hintFlags.freezeHintShown) {
                    showToast("꿀팁: 슬로우(레이다) 적이 캐논 폭발을 맞으면 ❄ 잠깐 빙결!", 2000);
                    hintFlags.freezeHintShown = true; saveHints();
                  }
                }
              }
              // --- NEW: T2 Awakening (Blackhole & Shatter) ---
              if (t.level >= 30) {
                if (!e.isBoss) {
                  const angle = Math.atan2(target.y - e.y, target.x - e.x);
                  e.x += Math.cos(angle) * 15;
                  e.y += Math.sin(angle) * 15;
                }
                if (e.frozenUntil > G.time) {
                  e.hp -= (e.hpMax * 0.05); // 5% Max HP True DMG
                  addFloatText("🧊💥", e.x, e.y - 15);
                }
              }
              dealDamage(e, dmg, t);
            }
          });
        } else {
          // Standard Shot 내부 로직
          if (t.slow > 0) {
            // 1. [공통 로직] 몬스터 종류에 상관없이 슬로우 디버프는 무조건 인가합니다.
            // (보스가 아예 멈추지 않고 50% 속도로 천천히 가는 로직은 tick 함수의 effectiveSlow *= 0.5 에서 이미 처리됨)
            target.slowUntil = Math.max(target.slowUntil, G.time + 1.5);
            target.slowFactor = Math.max(target.slowFactor, t.slow);

            // 2. [보스 반응 로직] 대상이 보스이고 잔여 돌진 횟수가 남아있다면, 돌진을 트리거합니다.
            if (target.isBoss && target.slowEvadeCount > 0) {

              // [수정] dashCooldown이 0 이하일 때만 새로운 돌진 허용
              if (!target.dashReq && !target.evadeDashReq && (target.dashCooldown || 0) <= 0) {
                target.slowEvadeCount--;
                target.evadeDashReq = true;
                target.dashCooldown = 2.0; // [신규 주입] 2초간 연쇄 돌진 차단
                addFloatText("돌진!", target.x, target.y - 20);
              }
            }
          }
          if (t.aoe > 0 && t.type !== 2) {
            G.enemies.forEach(e => { if (e.alive && dist(target, e) <= t.aoe) dealDamage(e, dmg, t); });
          } else {
            dealDamage(target, dmg, t);
            // --- NEW: T1 Awakening (Ricochet) ---
            if (t.type === 1 && t.level >= 30) {
              let ricochetTarget = null; let minDist = 120;
              for (const e of G.enemies) {
                if (e.alive && e !== target && dist(target, e) < minDist && !e.isStealth && !e.isTutorial) { // Ignore Tutorial Dummy
                  minDist = dist(target, e); ricochetTarget = e;
                }
              }
              if (ricochetTarget) {
                dealDamage(ricochetTarget, dmg * 0.6, t);
                G.projectiles.push({ x1: target.x, y1: target.y, x2: ricochetTarget.x, y2: ricochetTarget.y, life: 0.15, type: 1, aoe: 0 });
              }
            }
          }

          // Synergy Tagging: Track slow source
          if (t.slow > 0) {
            target.lastSlowedByType = t.type;
            target.lastSlowedAt = G.time;
          }

          G.projectiles.push({
            x1: t.x, y1: t.y, x2: target.x, y2: target.y,
            life: 0.15, type: t.type, aoe: t.aoe || 0
          });
        }
      }

      function dealDamage(e, dmg, t) {
        if (!e.alive) return;

        // [신규 교체 코드] 3 다중 무적 구역 (Safe Zones) 아키텍처
        // 몬스터와 가장 가까운 안전 구역까지의 거리 산출
        const minDist = Math.min(...entranceSafeZones.map(z => Math.hypot(e.x - z.x, e.y - z.y)));

        // 어느 한 구역이라도 반경 45px 이내에 있다면 데미지 및 슬로우 원천 차단
        if (minDist < 45) {
          return;
        }

        if (t && t.type === 3 && t.level >= 20) {
          e.poisonUntil = Math.max(e.poisonUntil, G.time + 4.0);
          const hybridPoison = 50 + ((t.level - 20) * 15) + (e.hpMax * 0.01);
          e.poisonDps = Math.max(e.poisonDps, hybridPoison);
        }

        let finalDmg = dmg;

        // --- Machinegun (T1) Armor Break Stacking ---
        if (t && t.type === 1 && !t.isHero) {
          if (G.time > e.mgStackUntil) e.mgStacks = 0;
          e.mgStacks += 1;
          e.mgStackUntil = G.time + MG_STACK_WINDOW;

          let threshold = MG_STACKS_NORMAL;
          if (e.isBoss) threshold = MG_STACKS_BOSS;
          else if (e.type === 'tank') threshold = MG_STACKS_TANK;

          if (e.mgStacks >= threshold && G.time >= e.vulnCdUntil) {
            e.vulnUntil = Math.max(e.vulnUntil, G.time + MG_VULN_DURATION);
            e.vulnCdUntil = G.time + MG_VULN_CD;
            e.mgStacks = 0;
            G.statsVulnCount++; // Ending stat tracker
            addFloatText("💥", e.x, e.y - 20);

            // Synergy Tips: Vuln
            hintFlags.vulnTriggeredOnce = true;
            if (!hintFlags.vulnHintShown) {
              showToast("꿀팁: 머신건이 계속 맞히면 🔴 '취약'! 탱커/보스가 더 빨리 녹아요.", 2000);
              hintFlags.vulnHintShown = true; saveHints();
            }
          }
        }

        // Apply Boss Defense Logic
        finalDmg = BossHandler.calcDamage(e, finalDmg, t);

        // T3 Tank (Hardness)
        if (!e.isBoss && e.tier >= 3 && e.type === 'tank') {
          finalDmg = Math.max(1, finalDmg - 10);
        }

        // Boss Vulnerability (Slowed -> +20% Dmg)
        if (e.isBoss && e.slowUntil > G.time) {
          finalDmg *= 1.2;
          addFloatText("Weak!", e.x, e.y - 20);
        }

        // --- Rental Hero SS Grade True Damage ---
        if (t && t.isHero && t.heroGrade === 'SS' && e.isBoss) {
          if (G.time >= t.ssTrueDmgCdUntil) {
            const trueDmg = Math.min(e.hp * 0.008, e.hpMax * 0.01);
            t.ssTrueDmgCdUntil = G.time + 0.8;
            finalDmg += trueDmg;
            addFloatText("TrueDmg!", e.x, e.y - 20);
          }
        }

        if (e.vulnUntil > G.time) {
          let mult = MG_VULN_MULT_NORMAL;
          if (e.isBoss) mult = MG_VULN_MULT_BOSS;
          else if (e.type === 'tank') mult = MG_VULN_MULT_TANK;

          if (t && t.type === 1 && t.level >= 30) mult = 1.5; // T1 Awakening Amp
          finalDmg *= mult;
        }

        e.hp -= finalDmg;
        e.hitTime = G.time; // Trigger Hit Flash

        if (e.hp <= 0 && e.alive) {
          // [신규 주입] 허수아비 처치 시 튜토리얼 강제 졸업 및 보상 지급
          if (e.isTutorial) {
            G.isTutorialDone = true;
            G.gold += 200; G.totalGoldEarned += 200; // NEW
            G.wave = 0;
            e.alive = false;
            log('🎉 튜토리얼 완료! [▶ 웨이브]를 눌러 본격적인 방어를 시작하세요.');
            updateUI();
            if (typeof saveGameState === 'function') saveGameState();
            return;
          }

          e.alive = false;

          if (!e.isBoss || e.bossType !== 10) G.currentFinishedCount++; // Kill count

          BossHandler.onDeath(e, G); // Check Boss Death Logic

          // Mini-Boss Drop (20% Chance for 1 Point)
          if (e.isMiniBoss && Math.random() < 0.2) {
            G.upgradePoints++;
            addFloatText(`Lucky! +1P`, e.x, e.y - 15);
          }

          addRewardGold(e);
          updateUI();
        } else if (e.isBoss) {
          updateUI(); // Update UI on Boss Hit for HP Bar
        }
      }


      function resetGame() {
        G.gold = 350; G.totalGoldEarned = 350; G.lives = 20; G.wave = 0; G.inWave = false;
        G.isResting = false; G.restTimer = 0;
        G.upgradePoints = 3; // Reset to 3
        G.playStartTime = Date.now();
        G.enemies = []; G.towers = []; G.projectiles = []; G.floatTexts = []; G.previewTower = null; G.pendingHero = null;

        // Reset Overclock
        G.overclockActive = false;
        G.overclockUntil = 0;
        G.overclockUsedThisWave = false;
        G.overclockCooldownUntil = 0;

        // Reset Finisher
        G.finisherUsedThisWave = false;
        G.finisherActive = false;
        G.finisherUntil = 0;
        G.finisherType = null;
        G.finisherFRMult = 1;
        G.finisherRangeMult = 1;
        G.finisherKillGoldMult = 1;
        G.rock = { available: true, active: false, timer: 0, duration: 10.0 };
        G.chapterResetPending = false;

        // Reset Ending State
        G.endingActive = false;
        G.endingType = null;
        G.endingPhase = 0;
        G.endingTimer = 0;
        G.endingStats = {};
        G.hiddenEndingLabel = "";
        G.statsFreezeCount = 0;
        G.statsVulnCount = 0;
        G.statsFinisherCount = 0;

        // --- NEW: Reset Map to Chapter 1 ---
        MAP_CONFIG.paths = CHAPTER_MAPS[0].paths;
        MAP_CONFIG.decorations = CHAPTER_MAPS[0].decorations;
        updateMapCache();
        // -----------------------------------

        log('🔄 초기화됨.'); updateUI();
      }

      function saveGameState() {
        const data = {
          wave: G.wave,
          gold: G.gold,
          lives: G.lives,
          upgradePoints: G.upgradePoints,
          towers: G.towers,
          isTutorialDone: G.isTutorialDone,
          schemaVersion: SCHEMA_VERSION
        };
        localStorage.setItem('defenseSave', JSON.stringify(data));
      }

      function loadGameState() {
        const saved = localStorage.getItem('defenseSave');
        if (!saved) return false;
        try {
          const data = JSON.parse(saved);
          if (data.schemaVersion !== SCHEMA_VERSION) {
            alert("Save data version mismatch.");
            return false;
          }
          G.wave = data.wave;
          G.gold = data.gold;
          G.lives = data.lives;
          G.upgradePoints = data.upgradePoints;
          G.towers = data.towers;

          // --- NEW: 로드된 타워들의 시간 종속적 상태 이상 강제 초기화 ---
          if (G.towers && G.towers.length > 0) {
            G.towers.forEach(t => {
              t.stunUntil = 0;
              t.cooldown = 0;
              t.targetCheckTimer = 0;
              t.target = null;
              if (t.isHero && t.heroGrade === 'S') t.globalBurnTimer = 0;
              if (t.isHero && t.heroGrade === 'SS') t.ssTrueDmgCdUntil = 0;
            });
            G.isTutorialDone = true;
          } else {
            G.isTutorialDone = data.isTutorialDone || false;
          }
          return true;
        } catch (e) {
          alert("Load failed.");
          return false;
        }
      }

      // initGameSession logic replaced inline.

      function render() {
        ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);

        // [Line 1265 부근 삽입]
        const themeIdx = Math.min(9, Math.floor(Math.max(0, G.wave - 1) / 10));
        const currentTheme = THEMES[themeIdx];

        // 1. 소굴 배경: 테마 동적 적용
        ctx.fillStyle = currentTheme.bg;
        ctx.fillRect(0, 0, LOGICAL_W, gridSize * 2 + offsetY);

        // 2. 용암 흐름 시각 효과 (맥동 로직)
        ctx.strokeStyle = currentTheme.stroke; ctx.lineWidth = 4;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath(); ctx.moveTo(Math.random() * LOGICAL_W, 0);
          ctx.lineTo(Math.cos(G.time + i) * 50 + (i * 100), gridSize * 2 + offsetY);
          ctx.globalAlpha = 0.2 + Math.sin(G.time * 2) * 0.1; ctx.stroke();
        }
        ctx.globalAlpha = 1.0;

        // 3. 지형지물 오브젝트 (테마 동적 렌더링)
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if (MAP_CONFIG.decorations) {
          MAP_CONFIG.decorations.forEach((dec, i) => {
            ctx.font = `${dec.font || '50px'} serif`;
            const emoji = currentTheme.decos[i % 3] || dec.emoji;
            ctx.fillText(emoji, dec.x, dec.y);
          });
        }

        // 4. 물리적 경계선 레이저
        ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 3;
        ctx.setLineDash([10, 5]);
        ctx.beginPath();
        ctx.moveTo(0, gridSize * 2 + offsetY);
        ctx.lineTo(LOGICAL_W, gridSize * 2 + offsetY);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
        for (let i = 0; i <= gridCols; i++) { const x = i * gridSize + offsetX; ctx.moveTo(x, 0); ctx.lineTo(x, LOGICAL_H); }
        for (let i = 0; i <= gridRows; i++) { const y = i * gridSize + offsetY; ctx.moveTo(0, y); ctx.lineTo(LOGICAL_W, y); }
        ctx.stroke();

        MAP_CONFIG.paths.forEach(p => {
          ctx.beginPath(); ctx.lineWidth = 40; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
          ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.moveTo(p[0].x, p[0].y);
          for (let i = 1; i < p.length; i++) ctx.lineTo(p[i].x, p[i].y);
          ctx.stroke();
        });

        // Projectiles (Layering: Below Towers/Enemies)
        G.projectiles.forEach(p => {
          ctx.globalAlpha = Math.max(0, p.life / 0.15); // Alpha Sync

          switch (p.type) {
            case 1: // Laser (Single)
              ctx.beginPath();
              ctx.lineWidth = 4; ctx.strokeStyle = '#7aa6ff';
              ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
              ctx.moveTo(p.x1, p.y1); ctx.lineTo(p.x2, p.y2);
              ctx.stroke();
              break;
            case 2: // Explosion (AOE) - Missile Volley
              // Trajectory (Smoke Trail)
              ctx.beginPath(); ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(100,100,100,0.5)';
              ctx.moveTo(p.x1, p.y1); ctx.lineTo(p.x2, p.y2); ctx.stroke();
              // Missile
              const progress = 1 - p.life / 0.25; // Approx
              if (progress < 1) {
                ctx.beginPath(); ctx.fillStyle = '#ffda00';
                const mx = p.x1 + (p.x2 - p.x1) * progress;
                const my = p.y1 + (p.y2 - p.y1) * progress;
                ctx.arc(mx, my, 2, 0, Math.PI * 2); ctx.fill();
              }

              // Impact Explosion
              ctx.beginPath();
              ctx.fillStyle = `rgba(255, 100, 50, ${p.life * 5})`;
              ctx.arc(p.x2, p.y2, 12, 0, Math.PI * 2); ctx.fill(); // Small explosion per missile

              // Final AOE Ring
              if (p.isFinal) {
                ctx.beginPath(); ctx.strokeStyle = `rgba(255, 50, 0, ${p.life * 3})`;
                ctx.lineWidth = 1;
                ctx.arc(p.x2, p.y2, p.aoe, 0, Math.PI * 2); ctx.stroke();
              }
              break;
            case 3: // Cold Wave (Slow)
              // Expanding Ring
              const r = Math.max(0, 30 - (p.life * 200));
              ctx.beginPath();
              ctx.strokeStyle = `rgba(100, 200, 255, ${p.life * 6})`;
              ctx.lineWidth = 3;
              ctx.arc(p.x2, p.y2, r, 0, Math.PI * 2); ctx.stroke();
              break;
            case 'emp': // EMP Beam
              ctx.beginPath();
              ctx.lineWidth = 3; ctx.strokeStyle = '#00ffff';
              ctx.setLineDash([5, 5]);
              ctx.moveTo(p.x1, p.y1); ctx.lineTo(p.x2, p.y2);
              ctx.stroke(); ctx.setLineDash([]);
              break;
          }
        });
        ctx.globalAlpha = 1; ctx.shadowBlur = 0; // Reset Effects

        G.towers.forEach(t => {
          ctx.save();
          ctx.translate(t.x, t.y);

          // Apply Recoil (Kickback)
          if (t.recoil > 0) {
            ctx.translate(-Math.cos(t.lastAngle) * t.recoil, -Math.sin(t.lastAngle) * t.recoil);
          }

          // Render Logic
          if (t.type === 3 && !t.isHero) {
            // Type 3 (Slow - Radar): Scan Effect & Awakening Color
            const isAwakened = t.level >= 20;
            const radarColor = isAwakened ? '#b3ff7a' : '#0ff';
            const coreColor = isAwakened ? 'rgba(179, 255, 122, 0.3)' : 'rgba(0, 255, 255, 0.3)';
            const sweepColor = isAwakened ? 'rgba(179, 255, 122, 0.5)' : 'rgba(0, 255, 255, 0.5)';

            ctx.rotate(-(t.lastAngle || 0) + G.time * 2);

            // Base Ring
            ctx.beginPath(); ctx.strokeStyle = radarColor; ctx.lineWidth = 2;
            ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.stroke();

            // Core
            ctx.fillStyle = coreColor;
            ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();

            // Radar Sweep
            ctx.fillStyle = sweepColor;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, 12, 0, 0.5); ctx.fill();
          } else {
            // Type 1 & 2 (Turrets) & Heroes: Aim at Target
            ctx.rotate(t.lastAngle || 0);

            if (t.isHero) {
              ctx.shadowBlur = 15 + Math.sin(G.time * 5) * 5;
              if (t.heroGrade === 'A') { ctx.shadowColor = '#50C878'; ctx.fillStyle = '#50C878'; }
              else if (t.heroGrade === 'S') { ctx.shadowColor = '#FFD700'; ctx.fillStyle = '#FFD700'; }
              else if (t.heroGrade === 'SS') { ctx.shadowColor = '#FF0033'; ctx.fillStyle = '#FF0033'; }

              ctx.fillRect(-12, -12, 24, 24);
              ctx.fillStyle = '#fff';
              ctx.fillRect(12, -4, 14, 8);
              ctx.shadowBlur = 0;
            } else if (t.type === 1) {
              // Type 1 (Single)
              ctx.fillStyle = (t.level >= 30) ? '#6a0dad' : '#666'; ctx.fillRect(-10, -10, 20, 20); // Body
              ctx.fillStyle = (t.level >= 30) ? '#e0b0ff' : '#333'; ctx.fillRect(10, -4, 12, 8);   // Barrel
            } else if (t.type === 2) {
              // Type 2 (AOE - 다련장 미사일 시스템 / MLRS)

              // 1. 하부 회전 마운트 (Base Mount)
              ctx.fillStyle = (t.level >= 30) ? '#1a001a' : '#2b303b';
              ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();

              // 2. 발사대 본체 (Launcher Pod) - 장갑판 느낌의 육중한 직사각형
              ctx.fillStyle = (t.level >= 30) ? '#3d003d' : '#4a5568';
              ctx.fillRect(-14, -12, 26, 24);

              // 3. 측면 장갑 패널 라인 (Armor Detailing)
              ctx.strokeStyle = '#1a202c';
              ctx.lineWidth = 2;
              ctx.strokeRect(-14, -12, 26, 24);

              // 4. 전면부 다련장 포트 하우징
              ctx.fillStyle = '#2d3748';
              ctx.fillRect(12, -11, 6, 22);

              // 5. 탄두(Warheads) 장전 상태 동기화 로직 (The "How" & "Why")
              // 타워의 쿨타임 데이터(t.cooldown)를 시각화하여 유저가 발사 타이밍을 예측 가능하게 함
              const isLoaded = t.cooldown <= 0.2;

              // 3행 2열(3x2)의 미사일 포트 배열 렌더링
              for (let row = -7; row <= 7; row += 7) {
                for (let col = 13; col <= 16; col += 3) {
                  ctx.beginPath();
                  ctx.arc(col, row, 1.8, 0, Math.PI * 2);

                  if (isLoaded) {
                    // 장전 완료: 붉은색 탄두 노출 및 미세한 광원(Glow) 이펙트

                    ctx.shadowColor = '#ff4d4d';

        });

        // 👇 [신규 교체] 🌑 이모지 운석 렌더링

          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

          if (G.rock.active) {
            // 💥 발동 중: 강하게 진동하는 🌑 운석

            ctx.font = '60px sans-serif';
            ctx.fillText('🌑', 0, 0);

            // 붉은색 카운트다운 타이머

            ctx.fillText(G.rock.timer.toFixed(1) + 's', 0, -40);
          } else {
            // 💤 대기 중: 반투명하게 대기하는 🌑 운석

            ctx.font = '40px sans-serif';
            ctx.fillText('🌑', 0, 0);

            ctx.fillStyle = '#8892b0'; ctx.font = 'bold 11px sans-serif';
